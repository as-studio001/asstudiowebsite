<!-- INTRO VIDEO OVERLAY（遷入形式參照 final原型結構ASstudio首頁_standalone.html 的做法：
     全螢幕影片覆蓋層，播完（或發生錯誤/逾時保險）就淡出移除，讓底下的網站內容顯露出來） -->
<div id="sc-intro-overlay" style="position:fixed; inset:0; z-index:99999; background:#ffffff; display:flex; align-items:center; justify-content:center; transition:opacity 0.6s ease;">
  <video id="sc-intro-video" autoplay muted playsinline preload="auto" style="width:100%; height:100%; object-fit:cover;">
    <source src="uploads/網頁前導片.mp4" type="video/mp4">
  </video>
</div>
<script>
(function () {
  var overlay = document.getElementById('sc-intro-overlay');
  var vid = document.getElementById('sc-intro-video');
  if (!overlay || !vid) return;

  var revealed = false;
  function reveal() {
    if (revealed) return;
    revealed = true;
    overlay.style.opacity = '0';
    setTimeout(function () { overlay.remove(); }, 600);
  }

  vid.addEventListener('ended', reveal);
  // 影片無法播放（格式不支援、載入失敗等）就直接顯露頁面，不要卡住
  vid.addEventListener('error', reveal);
  // 保險：萬一瀏覽器封鎖自動播放、ended/error 都沒觸發，逾時也要顯露頁面
  setTimeout(reveal, 15000);
})();
</script>

    ['r93', 'r23'],
    ['r93', 'r27'],
    ['r95', 'r24'],
    ['r96', 'r25'],
    ['r96', 'r23'],
    ['r97', 'r25'],
    ['r97', 'r23'],
    ['r98', 'r23'],
    ['r98', 'r27'],
    ['r99', 'r27'],
    ['r99', 'r23'],
    ['r101', 'r105'],
    ['r101', 'r106'],
    ['r101', 'r107'],
    ['r101', 'r108'],
    ['r101', 'r111'],
    ['r101', 'r113'],
    ['r101', 'r114'],
    ['r101', 'r57'],
    ['r109', 'r110'],
    ['r109', 'r111'],
    ['r109', 'r113'],
    ['r109', 'r114'],
    ['r112', 'r109'],
    ['r112', 'r101'],
    ['r114', 'r24'],
    ['r101', 'r49'],
    ['r116', 'r101'],
    ['r116', 'r24'],
    ['r116', 'r67'],
    ['r116', 'r114'],
    ['r116', 'r23']
  ];

  setHover(id) {
    this.setState({ hoveredId: id });
  }

  clearHover() {
    this.setState({ hoveredId: null });
  }

  toggleDarkMode() {
    this.setState(s => ({ isDarkMode: !s.isDarkMode }));
  }

  toggleMaterialMenu() {
    this.setState(s => ({ showMaterialMenu: !s.showMaterialMenu }));
  }

  toggleSearchModal() {
    this.setState(s => ({ showSearchModal: !s.showSearchModal, searchInput: '', searchResults: [] }));
  }

  componentDidMount() {
    this._onDocMouseDown = (e) => {
      const inBox = e.target && e.target.closest && e.target.closest('[data-search-box]');
      // Clicking anywhere except the search box closes the suggestion list.
      if (!inBox && this.state.searchResults.length) this.setState({ searchResults: [] });
      // ...and dismisses (fades out) an active flash highlight.
      if (!inBox && this.state.flashId != null) this.dismissFlash();
      const inMenu = e.target && e.target.closest && e.target.closest('[data-menu-box]');
      if (!inMenu && this.state.showMaterialMenu) this.setState({ showMaterialMenu: false });
    };
    document.addEventListener('mousedown', this._onDocMouseDown);
  }

  componentWillUnmount() {
    if (this._onDocMouseDown) document.removeEventListener('mousedown', this._onDocMouseDown);
    if (this._raf) cancelAnimationFrame(this._raf);
    if (this._fadeTimer) clearTimeout(this._fadeTimer);
    if (this._flash) this._flash.remove();
    if (this._tri) this._tri.remove();
  }

  goToNode(id) {
    if (this._fadeTimer) { clearTimeout(this._fadeTimer); this._fadeTimer = null; }
    this._dismissing = false;
    this.setState({ flashId: id, hoveredId: id, searchResults: [] });
    this.ensureFlash();
    this.ensureTriangle();
    this.startFlash(id);
    if (this._raf) cancelAnimationFrame(this._raf);
    this._raf = requestAnimationFrame(() => this.tick());
  }

  ensureFlash() {
    // Solid yellow circle. Body-appended (outside the DC template) so the
    // runtime's per-frame re-render can't reset its inline styles. z-index:1
    // sits ABOVE the opaque page background but BELOW the diagram (the #works
    // section is given z-index:2), so it never covers any graph element.
    if (this._flash && document.body.contains(this._flash)) return this._flash;
    const f = document.createElement('div');
    f.style.cssText = 'position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); border-radius:50%; pointer-events:none; z-index:1; display:none; opacity:0; transition:opacity 0.45s ease; filter:blur(4px);';
    document.body.appendChild(f);
    this._flash = f;
    return f;
  }

  ensureTriangle() {
    // Flat isosceles triangle that points at an off-screen target. Sits above
    // the graph (but below the header) so it's always visible at the edge.
    if (this._tri && document.body.contains(this._tri)) return this._tri;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:950; opacity:0; pointer-events:none; transition:opacity 0.45s ease;';
    const rot = document.createElement('div');
    rot.style.transform = 'rotate(0deg)';
    const pulse = document.createElement('div');
    pulse.style.cssText = 'animation: arrowPulse 0.9s ease-in-out infinite;';
    const tri = document.createElement('div');
    // Wide, short isosceles triangle pointing right.
    tri.style.cssText = 'width:52px; height:26px; background:#FFD400; clip-path:polygon(0% 0%, 0% 100%, 100% 50%); filter:drop-shadow(0 2px 5px rgba(0,0,0,0.35));';
    pulse.appendChild(tri);
    rot.appendChild(pulse);
    wrap.appendChild(rot);
    document.body.appendChild(wrap);
    this._tri = wrap;
    this._triRot = rot;
    return wrap;
  }

  startFlash(id) {
    const f = this._flash;
    const dot = document.querySelector('[data-dot="' + id + '"]');
    if (!f || !dot) return;
    const dr = dot.getBoundingClientRect();
    const clickedR = Math.max(dr.width, dr.height) / 2;
    let maxR = clickedR;
    document.querySelectorAll('[data-dot]').forEach(d => {
      const w = d.getBoundingClientRect().width / 2;
      if (w > maxR) maxR = w;
    });
    // Solid disc a bit larger than the biggest dot; soft edge via a radial
    // gradient that stays solid then fades right at the rim.
    const flashR = Math.max(clickedR * 2.2, maxR + 16);
    f.style.width = f.style.height = (flashR * 2) + 'px';
    f.style.webkitMaskImage = 'none';
    f.style.maskImage = 'none';
    f.style.background = 'radial-gradient(circle, rgba(255,208,0,0.95) 22%, rgba(255,208,0,0.6) 48%, rgba(255,208,0,0.25) 70%, rgba(255,208,0,0) 100%)';
    f.style.display = 'block';
  }

  dismissFlash() {
    this._dismissing = true;
    const f = this._flash, t = this._tri;
    if (f) f.style.opacity = '0';
    if (t) t.style.opacity = '0';
    if (this._fadeTimer) clearTimeout(this._fadeTimer);
    this._fadeTimer = setTimeout(() => {
      if (this._raf) cancelAnimationFrame(this._raf);
      this._raf = null;
      if (f) f.style.display = 'none';
      this.setState({ flashId: null, hoveredId: null });
    }, 480);
  }

  tick() {
    const id = this.state.flashId;
    if (id == null) return;
    const dot = document.querySelector('[data-dot="' + id + '"]');
    if (dot) {
      const dr = dot.getBoundingClientRect();
      const cxp = dr.left + dr.width / 2;
      const cyp = dr.top + dr.height / 2;
      const vw = window.innerWidth, vh = window.innerHeight, margin = 52;
      const inView = cxp >= margin && cxp <= vw - margin && cyp >= margin && cyp <= vh - margin;
      // Circle rides the dot.
      if (this._flash) {
        this._flash.style.left = cxp + 'px';
        this._flash.style.top = cyp + 'px';
      }
      // Triangle clamps to the screen edge, rotated toward the dot.
      if (this._tri) {
        const angle = Math.atan2(cyp - vh / 2, cxp - vw / 2);
        this._tri.style.left = Math.max(margin, Math.min(vw - margin, cxp)) + 'px';
        this._tri.style.top = Math.max(margin, Math.min(vh - margin, cyp)) + 'px';
        this._triRot.style.transform = 'rotate(' + (angle * 180 / Math.PI) + 'deg)';
      }
      // Cross-fade triangle <-> circle as the dot enters/leaves the viewport.
      if (!this._dismissing) {
        if (this._flash) this._flash.style.opacity = inView ? '1' : '0';
        if (this._tri) this._tri.style.opacity = inView ? '0' : '1';
      }
    }
    this._raf = requestAnimationFrame(() => this.tick());
  }

  handleSearchInput(e) {
    const query = e.target.value;
    this.setState({ searchInput: query });
    if (query.trim()) {
      const results = this.nodeData.filter(n => n.name.toLowerCase().includes(query.toLowerCase()));
      this.setState({ searchResults: results });
    } else {
      this.setState({ searchResults: [] });
    }
  }



  renderVals() {
    // Coordinate system is chosen to be ~1 viewBox unit ≈ 1 rendered CSS px
    // for the container's typical size, so font-size / radius values below
    // read as their literal px sizes on screen (not scaled down by the SVG).
    const cx = 450, cy = 450;
    const hoveredId = this.state.hoveredId;
    const isDarkMode = this.state.isDarkMode;
    const bgColor = isDarkMode ? 'oklch(0.15 0 0)' : 'oklch(0.99 0 0)';
    const textColor = isDarkMode ? 'oklch(0.95 0 0)' : 'oklch(0.16 0 0)';
    const lineColor = isDarkMode ? 'oklch(0.25 0 0)' : 'oklch(0.85 0 0)';
    const dotColor = isDarkMode ? 'oklch(0.95 0 0)' : 'oklch(0.16 0 0)';

    // Every node from column B sits on a single ring around the center
    // ("原型 x 未來"), in spreadsheet row order — matching the reference
    // site's circular layout. Node size scales with its connection count
    // (degree), and nodes are spaced so the gap between adjacent circles
    // stays a constant ~0.5mm regardless of each node's size.
    const ordered = this.nodeData;
    const n = ordered.length;

    const degree = {};
    ordered.forEach(d => { degree[d.id] = 0; });
    this.edgeData.forEach(([a, b]) => {
      if (a in degree) degree[a]++;
      if (b in degree) degree[b]++;
    });
    const maxDegree = Math.max(1, ...Object.values(degree));
    // Measured: this container renders the 900-unit viewBox at roughly a
    // 0.54 px-per-unit ratio (min(96vw,90vh) container / 900 viewBox), so
    // these constants are sized ~1.85x their literal on-screen target to
    // land in a legible range after that scale-down.
    const rMin = 4, rMax = 24;
    const nodeRadius = {};
    ordered.forEach(d => {
      const deg = degree[d.id];
      nodeRadius[d.id] = rMin + (deg / maxDegree) * (rMax - rMin);
    });
    // Slightly larger dots for visual weight, WITHOUT moving the ring layout,
    // label positions, or label sizing — those all keep using nodeRadius above.
    const dotScale = 1.18;

    const gapVB = 2.5;

    const diameterSum = ordered.reduce((sum, d) => sum + 2 * nodeRadius[d.id], 0);
    const circumference = diameterSum + n * gapVB;
    // Keep the ring well clear of the center "原型 × 未來" title regardless
    // of how tightly the nodes would otherwise pack.
    const radius = Math.max(circumference / (2 * Math.PI), 420);
    // Once radius is clamped up, re-derive the per-node gap so the arc walk
    // below still sums to exactly 2π·radius — otherwise the ring doesn't close.
    const effectiveGapVB = (2 * Math.PI * radius - diameterSum) / n;

    const positions = {};
    let arcPos = 0;
    ordered.forEach(d => {
      const r = nodeRadius[d.id];
      const angle = ((arcPos + r) / radius) - Math.PI / 2;
      positions[d.id] = {
        x: cx + radius * Math.cos(angle),
        y: cy + radius * Math.sin(angle),
        angle
      };
      arcPos += 2 * r + effectiveGapVB;
    });

    // Soft "spotlight" glow cast from the 原型結構 dot toward the center
    // title — same visual read as the existing connecting lines, just an
    // added faint glow layer. Narrow at the dot, widening as it reaches the
    // title so it reads as light spreading over distance.
    let spotlight = null;
    const spotlightSrc = positions['r23'];
    if (spotlightSrc) {
      const dirX = cx - spotlightSrc.x, dirY = cy - spotlightSrc.y;
      const len = Math.hypot(dirX, dirY) || 1;
      const ux = dirX / len, uy = dirY / len;
      const perpX = -uy, perpY = ux;
      const coneLen = len + 170;
      const halfWidth = 230;
      const baseX = spotlightSrc.x + ux * coneLen, baseY = spotlightSrc.y + uy * coneLen;
      const leftX = baseX + perpX * halfWidth, leftY = baseY + perpY * halfWidth;
      const rightX = baseX - perpX * halfWidth, rightY = baseY - perpY * halfWidth;
      spotlight = {
        points: spotlightSrc.x + ',' + spotlightSrc.y + ' ' + leftX + ',' + leftY + ' ' + rightX + ',' + rightY,
        x1: spotlightSrc.x, y1: spotlightSrc.y, x2: baseX, y2: baseY,
        color: isDarkMode ? '#FFFFFF' : '#EDEDED',
        peakOpacity: isDarkMode ? 0.045 : 0.55
      };
    }

    const relatedIds = new Set();
    if (hoveredId) {
      relatedIds.add(hoveredId);
      this.edgeData.forEach(([a, b]) => {
        if (a === hoveredId) relatedIds.add(b);
        if (b === hoveredId) relatedIds.add(a);
      });
    }

    const boxH = 20;
    const nodes = ordered.map(d => {
      const pos = positions[d.id];
      const r = nodeRadius[d.id];
      const gap = 20;
      const isRight = Math.cos(pos.angle) >= 0;
      const labelPointX = pos.x + Math.cos(pos.angle) * (r + gap);
      const labelPointY = pos.y + Math.sin(pos.angle) * (r + gap);
      const angleDeg = pos.angle * 180 / Math.PI;
      const rotateDeg = isRight ? angleDeg : angleDeg + 180;
      const dimmed = hoveredId && !relatedIds.has(d.id);
      const fontSize = 15;
      const isSpecial = this.specialIds.includes(d.id);
      const fontWeight = isSpecial ? 700 : 400;
      const isHoveredSelf = hoveredId === d.id;
      const specialColor = (!isDarkMode && isHoveredSelf) ? '#000000' : (isDarkMode ? '#BDA434' : '#9B9B9B');
      const dotFill = isSpecial ? specialColor : dotColor;
      const labelColor = isSpecial ? specialColor : textColor;
      // Size the box to comfortably fit the text (worst-case full-width CJK
      // glyphs) so nowrap text never overflows its box — overflow can shift
      // where the text-align anchor edge (the end nearest the node) actually
      // lands, breaking the otherwise-uniform node-to-label gap.
      const boxW = Math.max(160, d.name.length * fontSize + 20);
      return {
        id: d.id,
        name: d.name,
        href: d.href,
        cx: pos.x,
        cy: pos.y,
        r: r * dotScale,
        boxX: isRight ? labelPointX : labelPointX - boxW,
        boxY: labelPointY - boxH / 2,
        boxW,
        boxH,
        textAlign: isRight ? 'left' : 'right',
        fontSize,
        fontWeight,
        dotFill,
        labelColor,
        rotateDeg,
        pivotX: labelPointX,
        pivotY: labelPointY,
        opacity: dimmed ? 0.3 : 1,
        onEnter: () => this.setHover(d.id),
        onLeave: () => this.clearHover()
      };
    });

    const edges = this.edgeData.map(([a, b], i) => {
      const pa = positions[a], pb = positions[b];
      const dimmed = hoveredId && !(hoveredId === a || hoveredId === b);
      return {
        id: 'e' + i,
        x1: pa.x, y1: pa.y,
        x2: pb.x, y2: pb.y,
        opacity: dimmed ? 0.3 : 1
      };
    });

    return {
      nodes, edges, bgColor, textColor, lineColor, dotColor, isDarkMode,
      spotlight, hasSpotlight: !!spotlight,
      toggleDarkMode: () => this.toggleDarkMode(),
      showMaterialMenu: this.state.showMaterialMenu,
      toggleMaterialMenu: () => this.toggleMaterialMenu(),
      searchResults: this.state.searchResults.map(r => ({ id: r.id, name: r.name, go: () => this.goToNode(r.id) })),
      hasResults: this.state.searchResults.length > 0,
      searchInput: this.state.searchInput,
      handleSearchInput: (e) => this.handleSearchInput(e),
      setHover: (id) => this.setHover(id),
      goToNode: (id) => this.goToNode(id)
    };
  }
}

</script>

<!-- PAGE TRANSITION PRELOADER (homepage -> subpage) -->
<script>
(function () {
  // 快速跳字詞彙池（活頁簿1 C 欄粗體字，不含目的頁標題，由點擊的節點動態決定終點文字）
  var WORD_POOL = [
    '章architecturedesign', '原型原點', '原型結構', '木構造', '竹構造',
    'RC構造', '鋼構造', '成construction', '法structuredata', '構technics',
    '原型建築', '原型獲獎'
  ];
  var FLICKER_MS = 130;
  var LANDING_HOLD_MS = 550;
  var OVERLAY_BG = '#0a0a0a';
  var TEXT_COLOR = '#ffffff';
  var FADE_IN_MS = 250;

  var overlay, wordEl, navigating = false;

  function ensureOverlay() {
    if (overlay) return;
    overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:' + OVERLAY_BG + ';display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transform:translateY(0);transition:opacity ' + FADE_IN_MS + 'ms ease;';
    wordEl = document.createElement('span');
    wordEl.style.cssText = "font-family:'Noto Serif TC','Source Han Serif TC',serif;font-size:15px;font-weight:800;letter-spacing:.08em;color:" + TEXT_COLOR + ";white-space:nowrap;";
    overlay.appendChild(wordEl);
    document.body.appendChild(overlay);
  }

  function playAndNavigate(destinationWord, href) {
    ensureOverlay();
    overlay.style.pointerEvents = 'auto';
    wordEl.textContent = WORD_POOL[0];
    requestAnimationFrame(function () { overlay.style.opacity = '1'; });

    var sequence = WORD_POOL.concat([destinationWord]);
    var i = 0;
    function flicker() {
      wordEl.textContent = sequence[i];
      i++;
      if (i < sequence.length) {
        setTimeout(flicker, FLICKER_MS);
      } else {
        setTimeout(function () {
          try { sessionStorage.setItem('scTransitionIn', '1'); } catch (err) {}
          window.location.href = href;
        }, LANDING_HOLD_MS);
      }
    }
    flicker();
  }

  document.addEventListener('click', function (e) {
    var a = e.target && e.target.closest && e.target.closest('a[href$=".dc.html"]');
    if (!a || navigating) return;
    var href = a.getAttribute('href');
    if (!href || /^https?:\/\//i.test(href)) return;
    e.preventDefault();
    navigating = true;
    var labelEl = a.querySelector('div');
    var destinationWord = labelEl ? labelEl.textContent.trim() : '';
    playAndNavigate(destinationWord || '原型教學', href);
  });
})();
</script>
