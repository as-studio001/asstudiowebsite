    ['r88','r23'], ['r88','r27'], ['r89','r27'], ['r89','r23'], ['r90','r23'],
    ['r92','r23'], ['r93','r23'], ['r93','r27'], ['r95','r24'],
    ['r96','r25'], ['r96','r23'], ['r97','r25'], ['r97','r23'], ['r98','r23'], ['r98','r27'],
    ['r99','r27'], ['r99','r23'],
    ['r101','r105'], ['r101','r106'], ['r101','r107'], ['r101','r108'], ['r101','r111'], ['r101','r113'],
    ['r101','r114'], ['r101','r57'],
    ['r109','r110'], ['r109','r111'], ['r109','r113'], ['r109','r114'],
    ['r112','r109'], ['r112','r101'], ['r114','r24'], ['r101','r49'],
    ['r116','r101'], ['r116','r24'], ['r116','r67'], ['r116','r114'], ['r116','r23']
  ];

  const SPECIAL_IDS = new Set(['r1','r28','r59','r100','r2','r11','r22','r23','r101','r109','r115']);

  const CX = 450, CY = 450;
  const NS = 'http://www.w3.org/2000/svg';
  // v4: gaps are now computed dynamically from each pair's actual radii
  // (edge-to-edge), not a fixed per-slot table — bumped so any old-format
  // save is ignored (falls back to the default layout) rather than reused.
  const STORAGE_KEY = 'dotPositionEditor:committedPositions:v4';

  const svgEl = document.getElementById('svg');
  const edgesLayer = document.getElementById('edgesLayer');
  const nodesLayer = document.getElementById('nodesLayer');
  const toastEl = document.getElementById('toast');

  // Adjacency (for hover highlight) + degree (for dot sizing) — same derivation as the source page.
  const adjacency = {};
  NODE_DATA.forEach(d => { adjacency[d.id] = new Set(); });
  EDGE_DATA.forEach(([a, b]) => {
    if (adjacency[a]) adjacency[a].add(b);
    if (adjacency[b]) adjacency[b].add(a);
  });
  const degree = {};
  NODE_DATA.forEach(d => { degree[d.id] = adjacency[d.id].size; });
  const maxDegree = Math.max(1, ...Object.values(degree));

  const R_MIN = 4, R_MAX = 24, DOT_SCALE = 1.18, LABEL_GAP = 20;
  const nodeRadius = {};
  NODE_DATA.forEach(d => {
    nodeRadius[d.id] = R_MIN + (degree[d.id] / maxDegree) * (R_MAX - R_MIN);
  });

  // Same ring-packing walk as the source page, but the radius it derives is now
  // load-bearing: every dot is constrained to stay on this single circle, so
  // dragging can only ever change a dot's angle, never its distance from center
  // ("很多小圓排成一個大圓" — the small circles only travel along the big circle's
  // edge).
  function computeRingLayout() {
    const n = NODE_DATA.length;
    const gapVB = 2.5;
    const diameterSum = NODE_DATA.reduce((sum, d) => sum + 2 * nodeRadius[d.id], 0);
    const circumference = diameterSum + n * gapVB;
    const radius = Math.max(circumference / (2 * Math.PI), 420);
    const effectiveGap = (2 * Math.PI * radius - diameterSum) / n;
    const pos = {};
    let arc = 0;
    NODE_DATA.forEach(d => {
      const r = nodeRadius[d.id];
      const angle = ((arc + r) / radius) - Math.PI / 2;
      pos[d.id] = { x: CX + radius * Math.cos(angle), y: CY + radius * Math.sin(angle) };
      arc += 2 * r + effectiveGap;
    });
    return { positions: pos, radius };
  }

  function clonePositions(obj) {
    const out = {};
    Object.keys(obj).forEach(k => { out[k] = { x: obj[k].x, y: obj[k].y }; });
    return out;
  }

  const ringLayout = computeRingLayout();
  const DEFAULT_LAYOUT = ringLayout.positions;
  const RING_RADIUS = ringLayout.radius;
  // Mutable: adding/deleting a node in the list editor changes the node
  // count, but RING_RADIUS itself is never recomputed (matches the size
  // field's behaviour) — the ring's total circumference stays fixed, only
  // SLACK_PER_GAP absorbs the change.
  let n = NODE_DATA.length;

  function angleOf(pos) {
    return Math.atan2(pos.y - CY, pos.x - CX);
  }

  function ringPositionAtAngle(angle) {
    return { x: CX + RING_RADIUS * Math.cos(angle), y: CY + RING_RADIUS * Math.sin(angle) };
  }

  // Re-projects any stored {x,y} onto the ring by keeping only its angle —
  // guards against drift from floating point round-trips through localStorage.
  function snapToRing(pos) {
    return ringPositionAtAngle(angleOf(pos));
  }

  // Required angular gap between two SPECIFIC dots, edge-to-edge — computed
  // from each one's OWN actual drawn radius (precomputed once below), not a
  // shared/precomputed-per-pair value. This is what makes spacing stay
  // correct after a reorder: whoever ends up next to whoever, the gap comes
  // from their real sizes right then.
  const GAP_PADDING = 2.5;
  const scaledRadius = {};
  NODE_DATA.forEach(d => { scaledRadius[d.id] = nodeRadius[d.id] * DOT_SCALE; });
  function edgeGap(idA, idB) {
    return (scaledRadius[idA] + scaledRadius[idB] + GAP_PADDING) / RING_RADIUS;
  }

  // The total of every gap's minimum around a closed ring is the same no
  // matter the order (each dot's radius contributes to exactly two gaps
  // either way), so the leftover slack — and each gap's equal share of it —
  // is a constant, cheap to recompute (pure arithmetic, no DOM) whenever a
  // manual size edit changes some node's scaledRadius, but otherwise never
  // touched during a drag.
  let TOTAL_MIN_GAP, SLACK_PER_GAP;
  function recomputeSlack() {
    TOTAL_MIN_GAP = (2 * NODE_DATA.reduce((sum, d) => sum + scaledRadius[d.id], 0) + n * GAP_PADDING) / RING_RADIUS;
    SLACK_PER_GAP = (2 * Math.PI - TOTAL_MIN_GAP) / n;
  }
  recomputeSlack();

  // Picks whichever representation of `rawAngle` (mod 2π) sits closest to
  // `reference` — lets us compare/combine angles that may have wound past
  // ±π without a false discontinuity at the wrap point.
  function unwrapNear(rawAngle, reference) {
    return rawAngle + 2 * Math.PI * Math.round((reference - rawAngle) / (2 * Math.PI));
  }

  // order[i] = id currently in the i-th position around the ring; slotOf[id]
  // = that id's index in `order`. Purely a sequence — NOT tied to any fixed
  // angle — reconstructed from `current` any time `current` is replaced
  // wholesale (load, cancel, undo, redo). Position data itself always lives
  // only in `current`.
  const order = new Array(n);
  const slotOf = {};
  function rebuildOrderFromCurrent() {
    const sortedIds = NODE_DATA.map(d => d.id).sort((a, b) => angleOf(current[a]) - angleOf(current[b]));
    sortedIds.forEach((id, i) => { order[i] = id; slotOf[id] = i; });
  }

  function loadCommitted() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return clonePositions(DEFAULT_LAYOUT);
      const parsed = JSON.parse(raw);
      const merged = {};
      NODE_DATA.forEach(d => {
        merged[d.id] = (parsed[d.id] && typeof parsed[d.id].x === 'number')
          ? snapToRing({ x: parsed[d.id].x, y: parsed[d.id].y })
          : { x: DEFAULT_LAYOUT[d.id].x, y: DEFAULT_LAYOUT[d.id].y };
      });
      return merged;
    } catch (err) {
      return clonePositions(DEFAULT_LAYOUT);
    }
  }

  let committed = loadCommitted();
  let current = clonePositions(committed);
  rebuildOrderFromCurrent();

  // Undo/redo history — a stack of full position snapshots plus a pointer into
  // it. New actions (a finished drag, a Cancel revert) truncate any redo tail
  // and push a fresh snapshot; Undo/Redo just move the pointer.
  let history = [clonePositions(current)];
  let historyIndex = 0;

  function statesEqual(a, b) {
    return NODE_DATA.every(d => a[d.id].x === b[d.id].x && a[d.id].y === b[d.id].y);
  }

  function pushHistory() {
    if (statesEqual(current, history[historyIndex])) return;
    history = history.slice(0, historyIndex + 1);
    history.push(clonePositions(current));
    historyIndex = history.length - 1;
    updateHistoryButtons();
  }

  function undo() {
    if (historyIndex <= 0) return;
    historyIndex--;
    current = clonePositions(history[historyIndex]);
    rebuildOrderFromCurrent();
    renderAll();
    updateHistoryButtons();
  }

  function redo() {
    if (historyIndex >= history.length - 1) return;
    historyIndex++;
    current = clonePositions(history[historyIndex]);
    rebuildOrderFromCurrent();
    renderAll();
    updateHistoryButtons();
  }

  function updateHistoryButtons() {
    // Position undo/redo is meaningless mid list-structure-edit (the node
    // set itself is in flux) — disabled for the duration, same as the
    // header's own Commit/Cancel. Reset-spacing touches every node's
    // position too, so it's held to the same rule.
    btnUndo.disabled = structureEditing || historyIndex <= 0;
    btnRedo.disabled = structureEditing || historyIndex >= history.length - 1;
    btnResetSpacing.disabled = structureEditing;
  }

  const nodeEls = {};
  const edgesByNode = {};
  const edgeEls = [];

  // Shared by initial load, adding a connection, and rebuilding after a
  // cancelled list-structure edit. `edgesByNode[a]`/`[b]` must already
  // exist before this runs.
  function createEdgeElement(a, b) {
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('class', 'sc-edge');
    line.setAttribute('stroke', 'var(--line)');
    line.setAttribute('stroke-width', '1');
    edgesLayer.appendChild(line);
    const rec = { el: line, a, b };
    edgeEls.push(rec);
    edgesByNode[a].push(rec);
    edgesByNode[b].push(rec);
    return rec;
  }

  // Builds one node's dot/hit-target/label + drag/hover listeners. Shared
  // by initial load, adding a new node, and rebuilding after a cancelled
  // list-structure edit. Assumes nodeRadius[d.id]/scaledRadius[d.id] and
  // edgesByNode[d.id] are already set before this runs.
  function createNodeElements(d) {
    const isSpecial = SPECIAL_IDS.has(d.id);

    const g = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'sc-node');
    g.dataset.id = d.id;

    // Generous invisible hit target so small dots are still easy to grab.
    const hit = document.createElementNS(NS, 'circle');
    hit.setAttribute('class', 'sc-hit');
    hit.setAttribute('r', '26');
    g.appendChild(hit);

    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('class', 'sc-dot');
    dot.setAttribute('fill', isSpecial ? 'var(--special)' : 'var(--dot)');
    dot.setAttribute('r', String(scaledRadius[d.id]));
    g.appendChild(dot);

    // Plain SVG text instead of a foreignObject+div: same visual result
    // (position, rotation-flip, color/weight), but repositioning a <text>
    // is a native SVG attribute write with no embedded HTML layout pass —
    // foreignObject reflow was the dominant per-frame cost during a
    // swap-heavy drag, when relayoutRing() repositions every other node's
    // label in one synchronous batch.
    const label = document.createElementNS(NS, 'text');
    label.setAttribute('class', 'sc-label');
    label.setAttribute('font-size', '15');
    label.setAttribute('font-weight', isSpecial ? '700' : '400');
    label.setAttribute('fill', isSpecial ? 'var(--special)' : 'var(--text)');
    label.setAttribute('dominant-baseline', 'middle');
    label.textContent = d.name;
    g.appendChild(label);

    nodesLayer.appendChild(g);

    nodeEls[d.id] = { g, hit, dot, label };

    g.addEventListener('mouseenter', () => setHover(d.id));
    g.addEventListener('mouseleave', () => setHover(null));
    g.addEventListener('pointerdown', (e) => startDrag(e, d.id));
  }

  NODE_DATA.forEach(d => { edgesByNode[d.id] = []; });
  // Edges first so nodes/labels always render on top of the lines.
  EDGE_DATA.forEach(([a, b]) => createEdgeElement(a, b));
  NODE_DATA.forEach(d => createNodeElements(d));

  // Labels are drawn radially outward from wherever a dot ends up, and any
  // node can be dragged to any angle — so the box has to fit the longest
  // possible label in every direction, not just the default layout's.
  // Sized from each label's actual rendered width (not a guessed estimate)
  // so nothing can bleed past the box edge, where "overflow: visible" would
  // let it end up hidden behind the fixed header or clipped by the viewport
  // instead of just being fully contained. Kept live (not just at load) so
  // an edited name/size can only ever grow this, never leaves something
  // clipped after a rename or resize.
  let halfExtent = 0;
  function applyHalfExtent(newHalf) {
    halfExtent = newHalf;
    svgEl.setAttribute('viewBox', (CX - halfExtent) + ' ' + (CY - halfExtent) + ' ' + (2 * halfExtent) + ' ' + (2 * halfExtent));
    // Keep every dot/label at the same on-screen size as the original
    // 900-unit design (halfExtent 450) by growing the STAGE element itself
    // past the viewport instead of shrinking the drawing to fit it — the
    // extra room becomes ordinary scrollable page, not clipped overflow.
    document.getElementById('stage').style.setProperty('--content-scale', halfExtent / 450);
  }
  function nodeReach(id) {
    return RING_RADIUS + scaledRadius[id] + LABEL_GAP + nodeEls[id].label.getBBox().width + 12;
  }
  function ensureViewBoxFits(id) {
    const reach = nodeReach(id);
    if (reach > halfExtent) applyHalfExtent(reach);
  }
  applyHalfExtent(Math.max(...NODE_DATA.map(d => nodeReach(d.id))));

  function setHover(id) {
    const related = id ? new Set([id, ...adjacency[id]]) : null;
    NODE_DATA.forEach(d => {
      const dim = related && !related.has(d.id);
      nodeEls[d.id].g.style.opacity = dim ? '0.3' : '1';
    });
    edgeEls.forEach(rec => {
      const dim = !!id && !(rec.a === id || rec.b === id);
      rec.el.style.opacity = dim ? '0.3' : '1';
    });
  }

  function svgPoint(evt) {
    const pt = svgEl.createSVGPoint();
    pt.x = evt.clientX;
    pt.y = evt.clientY;
    return pt.matrixTransform(svgEl.getScreenCTM().inverse());
  }

  let dragId = null, dragAngleOffset = 0, dragUnwrappedAngle = 0;
  let dragStartClientX = 0, dragStartClientY = 0;
  const CLICK_MOVE_THRESHOLD = 5;
  // Raw pointermove can fire faster than the browser can paint, especially
  // during a long, fast drag where nearly every event crosses a swap
  // boundary and triggers a full relayoutRing(). Processing every single raw
  // event synchronously lets that work pile up faster than it can be drawn,
  // which is what reads as the dragged dot "fake-freezing" then jumping to
  // catch up. Instead, only the latest event is kept and the real work runs
  // once per animation frame — display-rate-capped, never backlogged.
  let pendingMoveEvent = null, moveFrameRequested = false;

  function startDrag(e, id) {
    if (lockedIds.has(id)) return;
    e.preventDefault();
    dragId = id;
    dragStartClientX = e.clientX;
    dragStartClientY = e.clientY;
    const p = svgPoint(e);
    const pointerAngle = Math.atan2(p.y - CY, p.x - CX);
    dragAngleOffset = angleOf(current[id]) - pointerAngle;
    dragUnwrappedAngle = angleOf(current[id]);
    const g = nodeEls[id].g;
    g.classList.add('dragging');
    edgesByNode[id].forEach(rec => rec.el.classList.add('sc-drag-live'));
    g.setPointerCapture(e.pointerId);
    g.addEventListener('pointermove', onDragMove);
    g.addEventListener('pointerup', onDragEnd);
    g.addEventListener('pointercancel', onDragEnd);
  }

  // A hair of extra room (way below anything visible), used only for the
  // placeholder position a just-swapped dot gets mid-cascade — see below.
  const TIE_BREAK_MARGIN = 1e-6;

  // The dragged dot always tracks the pointer exactly, free of any spacing
  // constraint — it is never blocked. Every OTHER dot stays exactly where it
  // is until the dragged dot's edge actually reaches it (not just its
  // center — with a real edge-to-edge gap required, waiting for the exact
  // center-crossing point would let them visibly overlap in the narrow
  // window just before it), at which point it swaps with the dragged dot.
  // A fast flick can cross several dots in one frame, cascading multiple
  // swaps — each one gets a cheap placeholder position (just enough so the
  // *next* crossing check, possibly in the other loop, isn't comparing
  // against a stale pre-swap spot), and the full, real redistribution across
  // every dot on the ring runs exactly once at the end, however many swaps
  // just happened, not once per swap.
  function onDragMove(e) {
    if (!dragId) return;
    pendingMoveEvent = e;
    if (!moveFrameRequested) {
      moveFrameRequested = true;
      requestAnimationFrame(processPendingMove);
    }
  }

  function processPendingMove() {
    moveFrameRequested = false;
    const e = pendingMoveEvent;
    pendingMoveEvent = null;
    if (!dragId || !e) return;
    applyDragMove(e);
  }

  // Moves `dragId` to `dragUnwrappedAngle`, cascading any swaps this
  // crosses and doing one full relayout if it did. Shared by live pointer
  // dragging and by the edit panel's angle field jumping straight to a
  // typed value — both are just "put dragId at this angle," so both reuse
  // the exact same tested swap/relayout logic.
  function resolveDragPosition() {
    current[dragId] = ringPositionAtAngle(dragUnwrappedAngle);

    // Bounded (never while(true)) as a hard safety net — a full cascade
    // can touch at most every other node once, so n is always enough, and
    // this guarantees the browser can never lock up here no matter what.
    for (let guard = 0; guard < n; guard++) {
      const k = slotOf[dragId];
      const nextId = order[(k + 1) % n];
      const boundary = unwrapNear(angleOf(current[nextId]), dragUnwrappedAngle) - edgeGap(dragId, nextId);
      if (dragUnwrappedAngle < boundary - 1e-9) break;
      order[k] = nextId; slotOf[nextId] = k;
      order[(k + 1) % n] = dragId; slotOf[dragId] = (k + 1) % n;
      // A locked neighbour's own coordinate is never reassigned (it's a
      // fixed pin, not a swap partner) — but the drag still passes it, so
      // the cascade keeps going to check whatever comes after it.
      if (!lockedIds.has(nextId)) {
        current[nextId] = ringPositionAtAngle(dragUnwrappedAngle - edgeGap(dragId, nextId) - TIE_BREAK_MARGIN);
      }
    }
    for (let guard = 0; guard < n; guard++) {
      const k = slotOf[dragId];
      const prevId = order[(k - 1 + n) % n];
      const boundary = unwrapNear(angleOf(current[prevId]), dragUnwrappedAngle) + edgeGap(dragId, prevId);
      if (dragUnwrappedAngle > boundary + 1e-9) break;
      order[k] = prevId; slotOf[prevId] = k;
      order[(k - 1 + n) % n] = dragId; slotOf[dragId] = (k - 1 + n) % n;
      if (!lockedIds.has(prevId)) {
        current[prevId] = ringPositionAtAngle(dragUnwrappedAngle + edgeGap(dragId, prevId) + TIE_BREAK_MARGIN);
      }
    }

    // Re-evens spacing around the whole ring on EVERY call, not just ones
    // that crossed a swap boundary — any frame where dragId moved counts as
    // "point positions differ," so the rest of the ring continuously stays
    // evenly shared out as the drag approaches it, not just at the instant
    // it actually swaps. dragId itself is the pin (it must stay exactly
    // under the pointer); every locked node elsewhere is pinned too, so it
    // never moves (and its own neighbouring gap stays as-is — see the
    // "reset spacing" header button for a full re-even including locks).
    relayoutRing(dragId);
    updateNode(dragId);
  }

  function applyDragMove(e) {
    const p = svgPoint(e);
    const rawAngle = Math.atan2(p.y - CY, p.x - CX) + dragAngleOffset;
    // Unwrap nearest to the running total so a full-turn drag is tracked
    // continuously instead of snapping back at the ±180° seam.
    dragUnwrappedAngle = unwrapNear(rawAngle, dragUnwrappedAngle);
    resolveDragPosition();
  }

  // Moves a node's ring angle directly, without an actual pointer drag on
  // the ring — reuses resolveDragPosition() by briefly borrowing the drag
  // state, so it goes through the identical swap-cascade + relayout as a
  // real drag to that angle. No history push (callers that fire this
  // repeatedly, like list-row dragging, push once at gesture-end instead).
  function moveNodeToRingSlot(id, targetRad) {
    const prevDragId = dragId, prevAngle = dragUnwrappedAngle;
    dragId = id;
    dragUnwrappedAngle = unwrapNear(targetRad, angleOf(current[id]));
    resolveDragPosition();
    dragId = prevDragId;
    dragUnwrappedAngle = prevAngle;
  }

  // The edit panel's position field: one-shot angle set, so it pushes
  // history immediately like any other completed position edit. A locked
  // node's position is fixed everywhere, not just against being dragged —
  // this is the other direct way to move a node, so it's guarded too.
  function setNodeAngle(id, targetRad) {
    if (lockedIds.has(id)) return;
    moveNodeToRingSlot(id, targetRad);
    pushHistory();
    syncListToRingOrder();
  }

  function onDragEnd(e) {
    if (!dragId) return;
    const id = dragId;
    const g = nodeEls[id].g;
    g.classList.remove('dragging');
    edgesByNode[id].forEach(rec => rec.el.classList.remove('sc-drag-live'));
    g.releasePointerCapture(e.pointerId);
    g.removeEventListener('pointermove', onDragMove);
    g.removeEventListener('pointerup', onDragEnd);
    g.removeEventListener('pointercancel', onDragEnd);
    dragId = null;
    pendingMoveEvent = null;
    // resolveDragPosition() already re-evens the whole ring's spacing on
    // every frame (not just swap crossings), so whatever it last computed
    // is already fully settled — nothing more to do here before recording it.
    pushHistory();
    if (id === editingId) refreshEditAngleField();
    // Keeps the list's own row order matching the ring's actual sequence
    // at all times (not just when pen mode opens), so entering list-edit
    // mode never surprises with a sudden reorder of what was just showing.
    syncListToRingOrder();

    const moved = Math.hypot(e.clientX - dragStartClientX, e.clientY - dragStartClientY);

    // Now reachable during pen mode too (locked nodes aside) — record real
    // moves as a structure-history step so the pen-mode ↶/↷ buttons can
    // undo/redo a canvas reposition exactly like a list-row drag. A plain
    // click (no real movement) leaves the ring untouched, so it's not a step.
    if (structureEditing && moved >= CLICK_MOVE_THRESHOLD) pushStructureHistory();

    // A plain click (negligible movement, not an actual drag) on a dot,
    // while the node list is open, targets that node for editing — the
    // same action as clicking its row's triangle, just reachable straight
    // from the diagram.
    if (listOpen && !structureEditing && moved < CLICK_MOVE_THRESHOLD) toggleEditTarget(id);
  }

  // Moves one dot + its bound title together, and re-anchors every line
  // touching it so the connections never visually detach mid-drag.
  function updateNode(id) {
    const pos = current[id];
    const rec = nodeEls[id];

    rec.dot.setAttribute('cx', pos.x);
    rec.dot.setAttribute('cy', pos.y);
    rec.hit.setAttribute('cx', pos.x);
    rec.hit.setAttribute('cy', pos.y);

    const r = nodeRadius[id];
    const angle = Math.atan2(pos.y - CY, pos.x - CX);
    const isRight = Math.cos(angle) >= 0;
    const labelPointX = pos.x + Math.cos(angle) * (r + LABEL_GAP);
    const labelPointY = pos.y + Math.sin(angle) * (r + LABEL_GAP);
    const angleDeg = angle * 180 / Math.PI;
    const rotateDeg = isRight ? angleDeg : angleDeg + 180;

    rec.label.setAttribute('x', labelPointX);
    rec.label.setAttribute('y', labelPointY);
    rec.label.setAttribute('text-anchor', isRight ? 'start' : 'end');
    rec.label.setAttribute('transform', 'rotate(' + rotateDeg + ' ' + labelPointX + ' ' + labelPointY + ')');

    edgesByNode[id].forEach(erec => {
      if (erec.a === id) { erec.el.setAttribute('x1', pos.x); erec.el.setAttribute('y1', pos.y); }
      if (erec.b === id) { erec.el.setAttribute('x2', pos.x); erec.el.setAttribute('y2', pos.y); }
    });
  }

  function renderAll() {
    NODE_DATA.forEach(d => updateNode(d.id));
  }

  renderAll();

  let toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }

  document.getElementById('btnCommit').addEventListener('click', () => {
    committed = clonePositions(current);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(committed)); } catch (err) {}
    showToast('已儲存目前的圓點位置');
  });

  document.getElementById('btnCancel').addEventListener('click', () => {
    current = clonePositions(committed);
    rebuildOrderFromCurrent();
    renderAll();
    pushHistory();
    showToast('已還原至上次儲存的位置');
  });

  // Builds the specialIds/nodeData/edgeData text block the maintainer pastes
  // into 建築事務所首頁.dc.html, straight from this tool's live state — ring
  // order (order[]), names, hrefs, special/colour flags (SPECIAL_IDS) and
  // connections (adjacency, deduped since it's stored symmetrically). This
  // editor has no server/git access of its own, so "sync" here means
  // generate-and-copy, not a direct file write.
  function buildSyncText() {
    const specialLine = 'specialIds = [' + order.filter(id => SPECIAL_IDS.has(id)).map(id => `'${id}'`).join(', ') + '];';

    const nodeDataLine = 'nodeData = [\n' + order.map(id => {
      const d = NODE_DATA.find(x => x.id === id);
      return `    { id: '${id}', name: ${JSON.stringify(d.name)}, href: ${JSON.stringify(d.href || '')} }`;
    }).join(',\n') + '\n  ];';

    const seenPairs = new Set();
    const pairs = [];
    order.forEach(id => {
      adjacency[id].forEach(other => {
        const key = id < other ? id + '|' + other : other + '|' + id;
        if (seenPairs.has(key)) return;
        seenPairs.add(key);
        pairs.push([id, other]);
      });
    });
    const edgeDataLine = 'edgeData = [\n    ' + pairs.map(([a, b]) => `['${a}', '${b}']`).join(',\n    ') + '\n  ];';

    return specialLine + '\n\n' + nodeDataLine + '\n\n' + edgeDataLine;
  }

  const syncModalOverlay = document.getElementById('syncModalOverlay');
  const syncOutputEl = document.getElementById('syncOutput');
  document.getElementById('btnSyncSite').addEventListener('click', () => {
    syncOutputEl.value = buildSyncText();
    syncModalOverlay.hidden = false;
  });
  document.getElementById('btnCloseSyncModal').addEventListener('click', () => {
    syncModalOverlay.hidden = true;
  });
  syncModalOverlay.addEventListener('click', (e) => {
    if (e.target === syncModalOverlay) syncModalOverlay.hidden = true;
  });
  document.getElementById('btnCopySync').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(syncOutputEl.value);
      showToast('已複製，可貼到主網頁檔案中');
    } catch (err) {
      syncOutputEl.focus();
      syncOutputEl.select();
      showToast('自動複製失敗，已選取內容，請手動複製（Ctrl+C）');
    }
  });

  const btnUndo = document.getElementById('btnUndo');
  const btnRedo = document.getElementById('btnRedo');
  const btnResetSpacing = document.getElementById('btnResetSpacing');
  btnUndo.addEventListener('click', undo);
  btnRedo.addEventListener('click', redo);
  btnResetSpacing.addEventListener('click', () => {
    resetAllSpacing();
    pushHistory();
    if (editingId) refreshEditAngleField();
    showToast('已重新整理所有圓點間距');
  });

  // Light/dark toggle — an explicit `data-theme` attribute always wins over
  // the OS/browser's own prefers-color-scheme (see the CSS), so this is a
  // real override, not just a one-time snapshot of the system preference.
  // The tiny inline script in <head> already applied any saved choice
  // before first paint; this just keeps the button's own icon/label and
  // future clicks in sync with it.
  const THEME_STORAGE_KEY = 'dotPositionEditor:theme:v1';
  const btnThemeToggle = document.getElementById('btnThemeToggle');
  const SUN_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>';
  const MOON_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';

  function currentTheme() {
    const explicit = document.documentElement.getAttribute('data-theme');
    if (explicit === 'light' || explicit === 'dark') return explicit;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  // Icon shows the theme a click WOULD switch to (a moon while light,
  // inviting a switch to dark; a sun while dark), matching the usual
  // convention for this kind of toggle.
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    btnThemeToggle.innerHTML = theme === 'dark' ? SUN_ICON_SVG : MOON_ICON_SVG;
    btnThemeToggle.setAttribute('aria-label', theme === 'dark' ? '切換為淺色模式' : '切換為深色模式');
  }
  applyTheme(currentTheme());
  btnThemeToggle.addEventListener('click', () => {
    const next = currentTheme() === 'dark' ? 'light' : 'dark';
    try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch (err) {}
    applyTheme(next);
  });
  document.addEventListener('keydown', (e) => {
    if (!(e.ctrlKey || e.metaKey) || e.key.toLowerCase() !== 'z') return;
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
  });

  // Left node list: closed by default, toggled open with a fixed edge
  // button. Opening it pushes #mainContent over (padding-left) instead of
  // overlaying the diagram. Picking a node scrolls it to the viewport
  // centre and reuses the existing hover-highlight (dim everything else,
  // light up this node + its connections) as the "locate" effect, cleared
  // automatically after a few seconds. Each row also has an arrow that
  // expands a flyout to its right, listing that node's connections (also
  // clickable) — a separate panel rather than an inline accordion, so
  // expanding one row never shifts the others' scroll position.
  document.documentElement.style.setProperty('--header-h', document.getElementById('pageHeader').offsetHeight + 'px');

  const btnToggleList = document.getElementById('btnToggleList');
  const nodeListEl = document.getElementById('nodeList');
  const mainEl = document.getElementById('mainContent');
  const listToggleIcon = document.getElementById('listToggleIcon');
  let listOpen = false;
  btnToggleList.addEventListener('click', () => {
    listOpen = !listOpen;
    nodeListEl.classList.toggle('open', listOpen);
    btnToggleList.classList.toggle('open', listOpen);
    mainEl.classList.toggle('list-open', listOpen);
    btnToggleList.setAttribute('aria-expanded', String(listOpen));
    listToggleIcon.textContent = listOpen ? '✕' : '☰';
    if (!listOpen) closeEditPanel();
  });

  let locateTimer = null;
  function locateNode(id) {
    const pt = svgEl.createSVGPoint();
    pt.x = current[id].x;
    pt.y = current[id].y;
    const screenPt = pt.matrixTransform(svgEl.getScreenCTM());
    window.scrollTo({
      left: screenPt.x + window.scrollX - window.innerWidth / 2,
      top: screenPt.y + window.scrollY - window.innerHeight / 2,
      behavior: 'smooth'
    });
    setHover(id);
    clearTimeout(locateTimer);
    locateTimer = setTimeout(() => setHover(null), 1800);
  }

  // Edit panel: an Illustrator-layers-style "target" icon per row limits
  // editing to exactly one node at a time (editingId). Its flyout carries
  // both the property form (name/angle/size/colour) and that node's
  // connection list (add via a picker, remove via a trash icon per row).
  // Only position edits go through pushHistory()/the existing undo-redo
  // and Commit/Cancel machinery, because that machinery is inherently
  // position-only (committed/localStorage store positions, not names,
  // sizes, colours or edges) — name/size/colour/connection edits are
  // deliberately immediate and outside that system.
  const nodeConnectionsEl = document.getElementById('nodeConnections');
  const nodeConnectionsItemsEl = document.getElementById('nodeConnectionsItems');
  const editNameInput = document.getElementById('editName');
  const editAngleInput = document.getElementById('editAngle');
  const editAngleDial = document.getElementById('editAngleDial');
  const dialTicksEl = document.getElementById('dialTicks');
  const dialPointerEl = document.getElementById('dialPointer');
  const editSizeInput = document.getElementById('editSize');
  const editColorSelect = document.getElementById('editColor');
  const editHrefInput = document.getElementById('editHref');
  const btnAddConnection = document.getElementById('btnAddConnection');
  const addConnectionRow = document.getElementById('addConnectionRow');
  const addConnectionSelect = document.getElementById('addConnectionSelect');

  const editBtnById = {};
  const listBtnById = {};
  const lockBtnById = {};
  const rowById = {};
  let editingId = null;

  // Pen-mode row lock — a locked node keeps its ring position fixed: it
  // can neither be dragged itself nor be swapped into by another row being
  // dragged past it. Purely an in-session editing aid (like the rest of
  // structure editing), not persisted to localStorage.
  const lockedIds = new Set();

  // Pen-mode multi-select — shift-click a row's name to extend a contiguous
  // range from `selectionAnchorId` (set by the last plain click) up to that
  // row. No new buttons; the existing name button just grew a modifier
  // behaviour. Purely a drag aid: dragging any selected row's handle moves
  // the whole selected block together (see startRowDrag/processPendingRowMove).
  let selectionAnchorId = null;
  let selectedIds = [];

  function clearSelectionVisuals() {
    selectedIds.forEach(id => { if (rowById[id]) rowById[id].classList.remove('row-selected'); });
  }

  function selectSingle(id) {
    clearSelectionVisuals();
    selectionAnchorId = id;
    selectedIds = [id];
    rowById[id].classList.add('row-selected');
  }

  function extendSelectionTo(id) {
    if (selectionAnchorId == null || !(selectionAnchorId in slotOf)) { selectSingle(id); return; }
    clearSelectionVisuals();
    const lo = Math.min(slotOf[selectionAnchorId], slotOf[id]);
    const hi = Math.max(slotOf[selectionAnchorId], slotOf[id]);
    selectedIds = [];
    for (let i = lo; i <= hi; i++) selectedIds.push(order[i]);
    selectedIds.forEach(sid => rowById[sid].classList.add('row-selected'));
  }

  function resetSelection() {
    clearSelectionVisuals();
    selectionAnchorId = null;
    selectedIds = [];
  }

  function closeEditPanel() {
    if (editingId) {
      editBtnById[editingId].classList.remove('active');
      rowById[editingId].classList.remove('editing');
    }
    editingId = null;
    nodeConnectionsEl.classList.remove('open');
    mainEl.classList.remove('connections-open');
    btnToggleList.classList.remove('connections-open');
    addConnectionRow.hidden = true;
  }

  function toggleEditTarget(id) {
    if (editingId === id) closeEditPanel(); else openEditPanel(id);
  }

  function openEditPanel(id) {
    if (editingId) {
      editBtnById[editingId].classList.remove('active');
      rowById[editingId].classList.remove('editing');
    }
    editingId = id;
    editBtnById[id].classList.add('active');
    rowById[id].classList.add('editing');
    // Jump the list itself to that row so it's obvious at a glance which
    // node the now-open panel belongs to, even if it was scrolled far down.
    rowById[id].scrollIntoView({ block: 'start', behavior: 'smooth' });
    addConnectionRow.hidden = true;

    const d = NODE_DATA.find(x => x.id === id);
    editNameInput.value = d.name;
    refreshEditAngleField();
    editSizeInput.value = Math.round(nodeRadius[id] * 10) / 10;
    editColorSelect.value = SPECIAL_IDS.has(id) ? 'special' : 'normal';
    editHrefInput.value = d.href || '';
    renderEditConnections();

    nodeConnectionsEl.classList.add('open');
    mainEl.classList.add('connections-open');
    btnToggleList.classList.add('connections-open');
  }

  function refreshEditAngleField() {
    if (!editingId) return;
    const deg = (angleOf(current[editingId]) * 180 / Math.PI + 360) % 360;
    editAngleInput.value = Math.round(deg * 10) / 10;
    updateDialPointer(deg);
  }

  // Angle dial: a plain circle (no fill) with 8 light ticks + degree labels
  // at every 45°, and a pointer line (no arrowhead) from centre to the
  // current angle. Ticks/labels are built once here; only the pointer line
  // moves after that, driven by the same degree value the number field
  // shows (so the two are always in sync — see refreshEditAngleField above).
  const DIAL_CX = 60, DIAL_CY = 60, DIAL_POINTER_R = 44;

  function buildAngleDialTicks() {
    [0, 45, 90, 135, 180, 225, 270, 315].forEach(deg => {
      const rad = deg * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);
      const tick = document.createElementNS(NS, 'line');
      tick.setAttribute('class', 'dial-tick');
      tick.setAttribute('x1', DIAL_CX + 43 * cos);
      tick.setAttribute('y1', DIAL_CY + 43 * sin);
      tick.setAttribute('x2', DIAL_CX + 48 * cos);
      tick.setAttribute('y2', DIAL_CY + 48 * sin);
      dialTicksEl.appendChild(tick);

      const label = document.createElementNS(NS, 'text');
      label.setAttribute('class', 'dial-tick-label');
      label.setAttribute('x', DIAL_CX + 59 * cos);
      label.setAttribute('y', DIAL_CY + 59 * sin);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('dy', '0.32em');
      label.textContent = deg;
      dialTicksEl.appendChild(label);
    });
  }
  buildAngleDialTicks();

  function updateDialPointer(deg) {
    const rad = deg * Math.PI / 180;
    dialPointerEl.setAttribute('x2', DIAL_CX + DIAL_POINTER_R * Math.cos(rad));
    dialPointerEl.setAttribute('y2', DIAL_CY + DIAL_POINTER_R * Math.sin(rad));
  }

  // Dragging the dial reuses the exact same swap-cascade + relayout-on-swap
  // logic as dragging a dot directly on the ring (resolveDragPosition, via
  // the shared dragId/dragUnwrappedAngle) — the dial is just another way of
  // aiming that same angle, batched per animation frame like the other two
  // pointer-drag surfaces in this file (ring dots, list rows) for the same
  // reason: raw pointermove can outrun paint.
  let dialDragging = false;
  let pendingDialEvent = null, dialFrameRequested = false;

  function dialAngleFromEvent(e) {
    const rect = editAngleDial.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    return Math.atan2(e.clientY - cy, e.clientX - cx);
  }

  function startDialDrag(e) {
    if (!editingId) return;
    e.preventDefault();
    dialDragging = true;
    dragId = editingId;
    dragUnwrappedAngle = unwrapNear(dialAngleFromEvent(e), angleOf(current[editingId]));
    resolveDragPosition();
    refreshEditAngleField();
    editAngleDial.classList.add('dial-dragging');
    editAngleDial.setPointerCapture(e.pointerId);
    editAngleDial.addEventListener('pointermove', onDialDragMove);
    editAngleDial.addEventListener('pointerup', onDialDragEnd);
    editAngleDial.addEventListener('pointercancel', onDialDragEnd);
  }

  function onDialDragMove(e) {
    if (!dialDragging) return;
    pendingDialEvent = e;
    if (!dialFrameRequested) {
      dialFrameRequested = true;
      requestAnimationFrame(processPendingDialMove);
    }
  }

  function processPendingDialMove() {
    dialFrameRequested = false;
    const e = pendingDialEvent;
    pendingDialEvent = null;
    if (!dialDragging || !e) return;
    dragUnwrappedAngle = unwrapNear(dialAngleFromEvent(e), dragUnwrappedAngle);
    resolveDragPosition();
    refreshEditAngleField();
  }

  function onDialDragEnd(e) {
    if (!dialDragging) return;
    dialDragging = false;
    pendingDialEvent = null;
    editAngleDial.classList.remove('dial-dragging');
    editAngleDial.releasePointerCapture(e.pointerId);
    editAngleDial.removeEventListener('pointermove', onDialDragMove);
    editAngleDial.removeEventListener('pointerup', onDialDragEnd);
    editAngleDial.removeEventListener('pointercancel', onDialDragEnd);
    dragId = null;
    pushHistory();
    syncListToRingOrder();
  }

  editAngleDial.addEventListener('pointerdown', startDialDrag);

  function renderEditConnections() {
    const id = editingId;
    nodeConnectionsItemsEl.innerHTML = '';
    NODE_DATA.filter(x => adjacency[id].has(x.id)).forEach(x => {
      const row = document.createElement('div');
      row.className = 'node-connections-row';

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'node-list-item' + (SPECIAL_IDS.has(x.id) ? ' special' : '');
      btn.textContent = x.name;
      btn.addEventListener('click', () => locateNode(x.id));
      row.appendChild(btn);

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'node-connections-remove';
      removeBtn.textContent = '🗑';
      removeBtn.setAttribute('aria-label', '取消連線');
      removeBtn.addEventListener('click', () => removeConnection(id, x.id));
      row.appendChild(removeBtn);

      nodeConnectionsItemsEl.appendChild(row);
    });
    populateAddConnectionSelect();
  }

  function populateAddConnectionSelect() {
    const id = editingId;
    addConnectionSelect.innerHTML = '<option value="">選擇要連線的節點…</option>';
    NODE_DATA.filter(x => x.id !== id && !adjacency[id].has(x.id)).forEach(x => {
      const opt = document.createElement('option');
      opt.value = x.id;
      opt.textContent = x.name;
      addConnectionSelect.appendChild(opt);
    });
  }

  function renameNode(id, name) {
    NODE_DATA.find(x => x.id === id).name = name;
    nodeEls[id].label.textContent = name;
    listBtnById[id].textContent = name;
    ensureViewBoxFits(id);
  }

  function setNodeHref(id, href) {
    NODE_DATA.find(x => x.id === id).href = href;
  }

  function setNodeSize(id, newRadius) {
    newRadius = Math.min(60, Math.max(1, newRadius));
    nodeRadius[id] = newRadius;
    scaledRadius[id] = newRadius * DOT_SCALE;
    nodeEls[id].dot.setAttribute('r', scaledRadius[id]);
    recomputeSlack();
    ensureViewBoxFits(id);
    updateNode(id);
  }

  function setNodeColor(id, isSpecial) {
    if (isSpecial) SPECIAL_IDS.add(id); else SPECIAL_IDS.delete(id);
    nodeEls[id].dot.setAttribute('fill', isSpecial ? 'var(--special)' : 'var(--dot)');
    nodeEls[id].label.setAttribute('fill', isSpecial ? 'var(--special)' : 'var(--text)');
    nodeEls[id].label.setAttribute('font-weight', isSpecial ? '700' : '400');
    listBtnById[id].classList.toggle('special', isSpecial);
  }

  function addConnection(id, otherId) {
    if (!otherId || id === otherId || adjacency[id].has(otherId)) return;
    adjacency[id].add(otherId);
    adjacency[otherId].add(id);
    createEdgeElement(id, otherId);
    updateNode(id);
    updateNode(otherId);
    renderEditConnections();
  }

  function removeConnection(id, otherId) {
    adjacency[id].delete(otherId);
    adjacency[otherId].delete(id);
    const idx = edgeEls.findIndex(rec => (rec.a === id && rec.b === otherId) || (rec.a === otherId && rec.b === id));
    if (idx === -1) return;
    const rec = edgeEls[idx];
    edgeEls.splice(idx, 1);
    rec.el.remove();
    edgesByNode[id] = edgesByNode[id].filter(r => r !== rec);
    edgesByNode[otherId] = edgesByNode[otherId].filter(r => r !== rec);
    renderEditConnections();
  }

  editNameInput.addEventListener('input', () => {
    if (editingId) renameNode(editingId, editNameInput.value);
  });
  editAngleInput.addEventListener('change', () => {
    if (!editingId) return;
    const deg = parseFloat(editAngleInput.value);
    if (isNaN(deg)) { refreshEditAngleField(); return; }
    setNodeAngle(editingId, ((deg % 360) + 360) % 360 * Math.PI / 180);
  });
  editSizeInput.addEventListener('change', () => {
    if (!editingId) return;
    const val = parseFloat(editSizeInput.value);
    if (isNaN(val)) { editSizeInput.value = Math.round(nodeRadius[editingId] * 10) / 10; return; }
    setNodeSize(editingId, val);
    editSizeInput.value = Math.round(nodeRadius[editingId] * 10) / 10;
  });
  editColorSelect.addEventListener('change', () => {
    if (editingId) setNodeColor(editingId, editColorSelect.value === 'special');
  });
  editHrefInput.addEventListener('input', () => {
    if (editingId) setNodeHref(editingId, editHrefInput.value);
  });
  btnAddConnection.addEventListener('click', () => {
    if (!editingId) return;
    addConnectionRow.hidden = !addConnectionRow.hidden;
    if (!addConnectionRow.hidden) populateAddConnectionSelect();
  });
  addConnectionSelect.addEventListener('change', () => {
    if (!editingId) return;
    const otherId = addConnectionSelect.value;
    if (otherId) addConnection(editingId, otherId);
  });

  const nodeListItemsEl = document.getElementById('nodeListItems');

  // Plain padlock silhouette (Material-style "lock" glyph) — same shape
  // always, only its colour (grey → black, via the .locked class + CSS
  // `currentColor`) shows the toggle, per the "剪影" request.
  const LOCK_ICON_SVG = '<svg viewBox="0 0 24 24"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM8.9 6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2H8.9V6zM18 20H6V10h12v10z"/></svg>';

  function updateLockButton(id) {
    const locked = lockedIds.has(id);
    const btn = lockBtnById[id];
    btn.classList.toggle('locked', locked);
    btn.setAttribute('aria-label', locked ? '解除鎖定此節點位置' : '鎖定此節點位置');
    rowById[id] && rowById[id].classList.toggle('row-locked', locked);
  }

  function toggleNodeLock(id) {
    if (lockedIds.has(id)) lockedIds.delete(id); else lockedIds.add(id);
    updateLockButton(id);
  }

  // Builds one list row: drag handle (reorder, structure-edit mode only) +
  // name (locate on click) + edit-target triangle + lock button + delete
  // button (both structure-edit mode only). Shared by initial load, adding
  // a new node, and rebuilding after a cancelled list-structure edit.
  function createListRow(d) {
    const row = document.createElement('div');
    row.className = 'node-list-row';
    rowById[d.id] = row;

    const handle = document.createElement('span');
    handle.className = 'node-list-handle';
    handle.textContent = '⠿';
    handle.addEventListener('pointerdown', (e) => startRowDrag(e, d.id));
    row.appendChild(handle);

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'node-list-item' + (SPECIAL_IDS.has(d.id) ? ' special' : '');
    btn.textContent = d.name;
    btn.addEventListener('click', (e) => {
      if (structureEditing && e.shiftKey) extendSelectionTo(d.id);
      else if (structureEditing) selectSingle(d.id);
      else locateNode(d.id);
    });
    row.appendChild(btn);
    listBtnById[d.id] = btn;

    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'node-list-edit-target';
    editBtn.textContent = '▸';
    editBtn.setAttribute('aria-label', '指定編輯此圓點');
    editBtn.addEventListener('click', () => toggleEditTarget(d.id));
    row.appendChild(editBtn);
    editBtnById[d.id] = editBtn;

    const lockBtn = document.createElement('button');
    lockBtn.type = 'button';
    lockBtn.className = 'node-list-lock';
    lockBtn.innerHTML = LOCK_ICON_SVG;
    lockBtn.addEventListener('click', () => toggleNodeLock(d.id));
    row.appendChild(lockBtn);
    lockBtnById[d.id] = lockBtn;
    updateLockButton(d.id);

    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'node-list-delete';
    delBtn.textContent = '🗑';
    delBtn.setAttribute('aria-label', '刪除此節點');
    delBtn.addEventListener('click', () => { if (deleteNodeImmediate(d.id)) pushStructureHistory(); });
    row.appendChild(delBtn);

    nodeListItemsEl.appendChild(row);
  }

  NODE_DATA.forEach(d => createListRow(d));

  // Pen-mode list-structure editing: reorder rows (drag), delete nodes,
  // add nodes. A session-only staging area — Commit just keeps whatever
  // the list looks like and exits; Cancel tears down and rebuilds the
  // whole diagram from a snapshot taken the moment edit mode was entered.
  // Not tied to localStorage (that stays position-only, per the existing
  // header buttons), so nothing here survives a page reload unless the
  // resulting positions are separately committed via the header.
  let structureEditing = false;
  let structureSnapshot = null;
  // Step-by-step undo/redo WITHIN a pen-mode session (add/delete/reorder),
  // separate from the header's position-only history (which stays disabled
  // the whole time structureEditing is true). structureHistory[0] is always
  // the entry snapshot — same one Cancel restores to.
  let structureHistory = [];
  let structureHistoryIndex = 0;

  function generateNodeId() {
    let maxNum = 0;
    NODE_DATA.forEach(d => {
      const m = /^r(\d+)$/.exec(d.id);
      if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
    });
    return 'r' + (maxNum + 1);
  }

  // Re-anchors the WHOLE ring evenly around `anchorId` (kept in place) —
  // same relayoutRing() a drag uses, so a node count change closes/expands
  // gaps smoothly instead of leaving a hole or a cramped seam, and any
  // locked node elsewhere stays exactly put too.
  function relayoutAroundAnchor(anchorId) {
    relayoutRing(anchorId);
    updateNode(anchorId);
  }

  function deleteNodeImmediate(id) {
    if (n <= 1) return false;
    if (editingId === id) closeEditPanel();
    if (selectedIds.includes(id)) resetSelection();

    edgesByNode[id].slice().forEach(rec => {
      const other = rec.a === id ? rec.b : rec.a;
      adjacency[id].delete(other);
      adjacency[other].delete(id);
      const idx = edgeEls.indexOf(rec);
      if (idx !== -1) edgeEls.splice(idx, 1);
      edgesByNode[other] = edgesByNode[other].filter(r => r !== rec);
      rec.el.remove();
    });
    delete edgesByNode[id];
    delete adjacency[id];

    const k = slotOf[id];
    order.splice(k, 1);
    delete slotOf[id];
    order.forEach((oid, i) => { slotOf[oid] = i; });
    n--;

    nodeEls[id].g.remove();
    delete nodeEls[id];
    rowById[id].remove();
    delete rowById[id];
    delete listBtnById[id];
    delete editBtnById[id];
    delete lockBtnById[id];
    delete nodeRadius[id];
    delete scaledRadius[id];
    delete current[id];
    SPECIAL_IDS.delete(id);
    lockedIds.delete(id);
    NODE_DATA.splice(NODE_DATA.findIndex(x => x.id === id), 1);

    recomputeSlack();
    if (n > 0) relayoutAroundAnchor(order[0]);
    return true;
  }

  function createNewNode() {
    const id = generateNodeId();
    const d = { id, name: '新節點', href: '' };
    NODE_DATA.push(d);
    n++;
    nodeRadius[id] = R_MIN;
    scaledRadius[id] = R_MIN * DOT_SCALE;
    adjacency[id] = new Set();
    edgesByNode[id] = [];

    // Insert right after the current last node in ring order, next to it,
    // then let the anchor-relayout spread everyone out to make room.
    const prevId = order[n - 2];
    order[n - 1] = id;
    slotOf[id] = n - 1;
    current[id] = prevId ? { x: current[prevId].x, y: current[prevId].y } : ringPositionAtAngle(0);

    recomputeSlack();
    createNodeElements(d);
    createListRow(d);
    ensureViewBoxFits(id);
    relayoutAroundAnchor(prevId || id);
    return id;
  }

  function snapshotStructure() {
    return {
      nodes: NODE_DATA.map(d => ({
        id: d.id, name: d.name, href: d.href,
        radius: nodeRadius[d.id],
        special: SPECIAL_IDS.has(d.id),
        x: current[d.id].x, y: current[d.id].y
      })),
      edges: edgeEls.map(rec => [rec.a, rec.b])
    };
  }

  function teardownAllNodes() {
    edgeEls.forEach(rec => rec.el.remove());
    edgeEls.length = 0;
    NODE_DATA.forEach(d => {
      nodeEls[d.id].g.remove();
      rowById[d.id].remove();
    });
    NODE_DATA.length = 0;
    [nodeEls, edgesByNode, adjacency, current, nodeRadius, scaledRadius, listBtnById, editBtnById, lockBtnById, rowById, slotOf]
      .forEach(map => Object.keys(map).forEach(k => delete map[k]));
    SPECIAL_IDS.clear();
    order.length = 0;
    n = 0;
  }

  function rebuildFromSnapshot(snap) {
    snap.nodes.forEach(nd => {
      NODE_DATA.push({ id: nd.id, name: nd.name, href: nd.href });
      nodeRadius[nd.id] = nd.radius;
      scaledRadius[nd.id] = nd.radius * DOT_SCALE;
      if (nd.special) SPECIAL_IDS.add(nd.id);
      current[nd.id] = { x: nd.x, y: nd.y };
      adjacency[nd.id] = new Set();
      edgesByNode[nd.id] = [];
      n++;
    });
    snap.edges.forEach(([a, b]) => {
      adjacency[a].add(b);
      adjacency[b].add(a);
      createEdgeElement(a, b);
    });
    NODE_DATA.forEach(d => createNodeElements(d));
    NODE_DATA.forEach(d => createListRow(d));
    recomputeSlack();
    rebuildOrderFromCurrent();
    renderAll();
  }

  function restoreFromStructureSnapshot(snap) {
    teardownAllNodes();
    rebuildFromSnapshot(snap);
    // Locks aren't part of the snapshot (they're a pure editing aid, not
    // structural data) — but an id that no longer exists after this restore
    // (e.g. undoing an "add node") must drop its lock entry too, or a later
    // generateNodeId() reusing that same id would silently come back locked.
    const keep = new Set(snap.nodes.map(nd => nd.id));
    Array.from(lockedIds).forEach(id => { if (!keep.has(id)) lockedIds.delete(id); });
    // Selection state is even more transient than locks — row identity
    // across an undo/redo/cancel isn't guaranteed meaningful, so it's
    // simplest and safest to just drop it.
    selectionAnchorId = null;
    selectedIds = [];
  }

  // Records one completed structural step (add / delete / a finished
  // reorder drag) so the pen-mode toolbar's ↶/↷ buttons can step through
  // them without leaving structure-editing mode — distinct from Cancel,
  // which always jumps straight back to structureHistory[0] and exits.
  function pushStructureHistory() {
    structureHistory = structureHistory.slice(0, structureHistoryIndex + 1);
    structureHistory.push(snapshotStructure());
    structureHistoryIndex = structureHistory.length - 1;
    updateStructureHistoryButtons();
  }

  function undoStructure() {
    if (structureHistoryIndex <= 0) return;
    structureHistoryIndex--;
    restoreFromStructureSnapshot(structureHistory[structureHistoryIndex]);
    updateStructureHistoryButtons();
  }

  function redoStructure() {
    if (structureHistoryIndex >= structureHistory.length - 1) return;
    structureHistoryIndex++;
    restoreFromStructureSnapshot(structureHistory[structureHistoryIndex]);
    updateStructureHistoryButtons();
  }

  function updateStructureHistoryButtons() {
    btnListUndo.disabled = structureHistoryIndex <= 0;
    btnListRedo.disabled = structureHistoryIndex >= structureHistory.length - 1;
  }

  // Re-appends every row in the ring's actual angular sequence (order[]),
  // and reorders NODE_DATA to match, so the list is never left showing a
  // stale sequence next to a ring that's since been dragged around.
  function syncListToRingOrder() {
    const byId = {};
    NODE_DATA.forEach(d => { byId[d.id] = d; });
    NODE_DATA.length = 0;
    order.forEach(id => NODE_DATA.push(byId[id]));
    order.forEach(id => nodeListItemsEl.appendChild(rowById[id]));
  }

  // Pure exchange of exactly two nodes' ring positions — no relayout, no
  // effect on any other node. The list is only a sequence, so a list-driven
  // reorder must be exactly that: two entries trade places, spacing
  // between every OTHER point stays byte-for-byte unchanged. (The main
  // canvas drag deliberately does the opposite — full-ring relayout on
  // every swap — but that's a different, already-requested behaviour for
  // dragging directly on the ring; list-row dragging is not that.)
  function swapRingNodes(idA, idB) {
    const posA = current[idA];
    current[idA] = current[idB];
    current[idB] = posA;
    const slotA = slotOf[idA], slotB = slotOf[idB];
    order[slotA] = idB;
    order[slotB] = idA;
    slotOf[idA] = slotB;
    slotOf[idB] = slotA;
    updateNode(idA);
    updateNode(idB);
  }

  // Locked-neighbour variant of the swap above: `lockedId` keeps its exact
  // (x,y) — never reassigned — while `dragId` hops past it, landing at the
  // minimum real gap beyond the locked node's fixed angle, on whichever
  // side it approached from. Only the two slots trade places in order[]/
  // slotOf (dragId's index moves past lockedId's), same bookkeeping as a
  // normal swap, but only dragId's own coordinate actually changes — so a
  // locked node is a hole the drag can pass through without ever having to
  // move itself, letting the cascade keep going to reach further neighbours.
  function passLockedNode(dragId, lockedId, dir) {
    const lockedAngle = angleOf(current[lockedId]);
    const gap = edgeGap(dragId, lockedId) + TIE_BREAK_MARGIN;
    current[dragId] = ringPositionAtAngle(dir > 0 ? lockedAngle + gap : lockedAngle - gap);
    const kDrag = slotOf[dragId], kLocked = slotOf[lockedId];
    order[kDrag] = lockedId; slotOf[lockedId] = kDrag;
    order[kLocked] = dragId; slotOf[dragId] = kLocked;
    updateNode(dragId);
  }

  // Redistributes spacing around the WHOLE ring after any swap, in either
  // editing mode — a swap (plain, or hopping past a lock) leaves one gap
  // squeezed and another oversized, since only the two participants' own
  // coordinates were touched. This evens it back out: every node that isn't
  // pinned gets redistributed within whichever arc it falls in between two
  // pins, same "share the leftover slack evenly" idea the default layout
  // itself uses. Pins are every locked node PLUS `anchorId` if given (the
  // one live thing this call must not move — the dot under the pointer
  // during a canvas drag, or whichever row a list-drag just placed) — with
  // no locks at all, anchorId is the sole pin and this reduces to a single
  // arc running all the way around back to it, i.e. relayoutAll(). (A
  // locked node's own neighbouring gap is intentionally left as whatever
  // the swap/pass left it at — the dedicated "reset spacing" header button
  // is what fully re-evens the ring including locked nodes, on demand.)
  function relayoutRing(anchorId) {
    const pinIds = new Set(lockedIds);
    if (anchorId != null) pinIds.add(anchorId);
    const pinSlots = [];
    for (let i = 0; i < n; i++) if (pinIds.has(order[i])) pinSlots.push(i);
    if (pinSlots.length === 0) return;

    const m = pinSlots.length;
    for (let a = 0; a < m; a++) {
      const startSlot = pinSlots[a];
      const endSlot = pinSlots[(a + 1) % m];
      const startId = order[startSlot];
      const endId = order[endSlot];

      const freeIds = [];
      for (let k = (startSlot + 1) % n; k !== endSlot; k = (k + 1) % n) {
        freeIds.push(order[k]);
      }
      if (freeIds.length === 0) continue;

      // The arc's span comes ONLY from its two pin endpoints — both always-
      // correct, never-drifting reference points — never from unwrapping
      // through the free nodes' own current positions. This call runs on
      // every frame of a live canvas drag now (not just swap crossings), so
      // the free nodes' stored positions are themselves about to be
      // overwritten by THIS call — chaining unwrapNear() through them let
      // each frame's tiny rounding/relayout differences compound over
      // hundreds of frames until one node's wound-angle guess flipped to
      // the wrong lap, corrupting arcSlackPerGap (even negative) and
      // cascading into runaway swapping. Two pins and plain mod-2π
      // arithmetic have no such history to drift.
      const startAngle = angleOf(current[startId]);
      const chain = [startId].concat(freeIds, [endId]);
      let minGapSum = 0;
      for (let i = 0; i < chain.length - 1; i++) minGapSum += edgeGap(chain[i], chain[i + 1]);

      let totalArcSpan;
      if (startSlot === endSlot) {
        totalArcSpan = 2 * Math.PI;
      } else {
        totalArcSpan = ((angleOf(current[endId]) - startAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
        // The live drag anchor's raw angle can end up numerically on
        // EITHER side of a pin it's approaching, for a frame or two right
        // at the boundary, before order[] actually reflects a swap past
        // it (see resolveDragPosition's own TIE_BREAK_MARGIN window) — a
        // plain "shortest forward" mod pick can then choose completely the
        // wrong lap (a near-zero span for an arc that topologically has to
        // cross most of the ring through every free node in `chain`).
        // That's geometrically impossible — freeIds all need their own
        // real minimum gap — so if the naive span can't even fit them,
        // it's the wrong branch: the true one is one lap further out.
        if (totalArcSpan < minGapSum) totalArcSpan += 2 * Math.PI;
      }

      const arcSlackPerGap = (totalArcSpan - minGapSum) / (chain.length - 1);

      let angle = startAngle;
      let prevId = startId;
      freeIds.forEach(id => {
        angle += edgeGap(prevId, id) + arcSlackPerGap;
        current[id] = ringPositionAtAngle(angle);
        updateNode(id);
        prevId = id;
      });
    }
  }

  // "重新整理間距" header button: fully re-evens the WHOLE ring — every gap
  // becomes its real edge-to-edge minimum plus an equal share of the
  // leftover slack, the same formula the default layout itself uses —
  // fixing any accumulated unevenness or overlap. Nothing gets reordered,
  // only respaced. A currently-locked node would normally anchor an arc
  // and block a true ring-wide even-out (everyone else could only spread
  // evenly *around* it), so every lock is temporarily freed to take part
  // too. They're then re-locked at their new spot.
  function resetAllSpacing() {
    recomputeSlack();
    const wasLocked = Array.from(lockedIds);

    // This ring's own gap layout, accumulated forward from order[0] at
    // angle 0 — fixed by order[] and each node's real radius alone; the
    // whole target layout is just "start at θ" for whichever θ we pick.
    const cumOffset = [0];
    for (let i = 1; i < n; i++) {
      cumOffset[i] = cumOffset[i - 1] + edgeGap(order[i - 1], order[i]) + SLACK_PER_GAP;
    }

    // With no locks at all, minimize disruption to the WHOLE ring instead
    // (still a meaningful choice, not an arbitrary one) rather than the
    // (empty) locked set.
    const reference = wasLocked.length > 0 ? wasLocked : order;

    // Each reference point's own "zero-displacement" rotation — the θ that
    // would leave that one point exactly where its centre already is.
    const impliedThetas = reference.map(id => angleOf(current[id]) - cumOffset[slotOf[id]]);

    // Averaging these via their SHORTEST signed offset from one reference
    // point (not a raw vector sum) is what makes each point move by its
    // own shortest distance, in its own natural direction: e.g. with two
    // reference points, θ lands exactly at the midpoint of their shortest
    // arc, so whichever one's centre is left of that midpoint shifts left
    // and whichever is to the right shifts right, by equal amounts. A raw
    // vector-sum mean can go unstable for near-opposite points (their
    // vectors nearly cancel, leaving an almost arbitrary direction) —
    // shortest-signed-offset averaging never has that failure mode.
    const refTheta = impliedThetas[0];
    let sumOffset = 0;
    impliedThetas.forEach(t => {
      let diff = (t - refTheta) % (2 * Math.PI);
      if (diff > Math.PI) diff -= 2 * Math.PI;
      if (diff < -Math.PI) diff += 2 * Math.PI;
      sumOffset += diff;
    });
    const theta = refTheta + sumOffset / impliedThetas.length;

    lockedIds.clear();
    for (let i = 0; i < n; i++) {
      current[order[i]] = ringPositionAtAngle(theta + cumOffset[i]);
      updateNode(order[i]);
    }
    wasLocked.forEach(id => lockedIds.add(id));
  }

  // Drag-to-reorder rows (structure-edit mode only) — dragging a row down
  // past another swaps them on the ring too (down = clockwise, matching
  // ringPositionAtAngle's convention), via the pure swap above. Nothing
  // about the ring changes until a swap actually fires; moving the mouse
  // without crossing a row's midline does nothing to the ring at all.
  let rowDragId = null;
  let pendingRowEvent = null, rowFrameRequested = false;
  // The trigger is each dragged row's own midline, not the raw cursor —
  // tracked as "row's original midline + how far the cursor has moved
  // since grab", not "row's original midline + absolute cursor position".
  // Comparing raw cursor Y directly against target rows' midlines was the
  // over-sensitive version: it ignored where within the row you'd grabbed
  // it, so the effective trigger point drifted with the grab point instead
  // of tracking the row's actual rendered position.
  let rowDragStartClientY = 0, rowDragStartMidY = 0;
  // Tracks whether ANY swap happened over the whole drag (not just the
  // current frame), so onRowDragEnd can record a single structure-history
  // step for the drag as a whole instead of one per frame.
  let rowDragSwapped = false;
  // The full set of rows moving together this drag: just [rowDragId] for
  // an ordinary drag, or the whole contiguous multi-selection if the
  // grabbed row is part of one (see selectSingle/extendSelectionTo). Each
  // member's own natural midline at grab time is recorded too, so every
  // member is tracked the exact same way rowDragId alone always was —
  // own start position + the one shared cursor delta — which is what keeps
  // the group moving as a single rigid block instead of just rowDragId.
  let rowDragBlockIds = [];
  let rowDragBlockStartMidY = {};

  // Listeners go on `document`, not the row itself with setPointerCapture —
  // syncListToRingOrder() re-appends every row (including whichever one is
  // mid-drag) on each move, and per the DOM spec appendChild on a node
  // already in the tree removes-then-reinserts it, which silently releases
  // element-held pointer capture. document is never removed, so it isn't
  // affected, and the drag reliably ends when the pointer is actually
  // released instead of continuing to track the cursor afterward.
  function startRowDrag(e, id) {
    if (!structureEditing) return;
    if (lockedIds.has(id)) return;
    e.preventDefault();
    rowDragId = id;
    rowDragSwapped = false;
    rowDragStartClientY = e.clientY;
    rowDragBlockIds = selectedIds.includes(id) ? selectedIds.slice() : [id];
    rowDragBlockStartMidY = {};
    rowDragBlockIds.forEach(bid => {
      const r = rowById[bid];
      r.style.transform = '';
      const rect = r.getBoundingClientRect();
      rowDragBlockStartMidY[bid] = rect.top + rect.height / 2;
    });
    rowDragStartMidY = rowDragBlockStartMidY[id];
    rowById[id].classList.add('row-dragging');
    document.addEventListener('pointermove', onRowDragMove);
    document.addEventListener('pointerup', onRowDragEnd);
    document.addEventListener('pointercancel', onRowDragEnd);
  }

  function onRowDragMove(e) {
    if (!rowDragId) return;
    pendingRowEvent = e;
    if (!rowFrameRequested) {
      rowFrameRequested = true;
      requestAnimationFrame(processPendingRowMove);
    }
  }

  // Whichever block member currently sits furthest in direction `dir`
  // (dir>0: largest slot / bottom edge, dir<0: smallest slot / top edge).
  // Re-derived fresh every call (never cached) since a member's slot can
  // change mid-cascade as the block bubbles past external rows.
  function rowDragBlockEdge(dir) {
    let best = rowDragBlockIds[0], bestSlot = slotOf[best];
    rowDragBlockIds.forEach(id => {
      const s = slotOf[id];
      if (dir > 0 ? s > bestSlot : s < bestSlot) { bestSlot = s; best = id; }
    });
    return best;
  }

  // Bubbles one external row (just outside the block) through the whole
  // block, one adjacent swap/pass at a time, nearest member first —
  // composing a block-move entirely out of the same pairwise primitive a
  // plain single-row drag uses. E.g. dragging block [A,B,C] down past D is
  // swap(D,C) then swap(D,B) then swap(D,A), landing on D,A,B,C exactly —
  // each step already individually correct on its own, including a locked
  // member in the middle of the block (that step becomes a pass instead of
  // a swap, same as it would for a single locked neighbour).
  function bubbleExternalThroughBlock(extId, blockDir) {
    const extDir = -blockDir; // extId moves opposite the block's own drag direction
    const ordered = rowDragBlockIds.slice().sort((a, b) =>
      blockDir > 0 ? slotOf[b] - slotOf[a] : slotOf[a] - slotOf[b]
    );
    ordered.forEach(memberId => {
      if (lockedIds.has(memberId)) passLockedNode(extId, memberId, extDir);
      else swapRingNodes(extId, memberId);
    });
  }

  function processPendingRowMove() {
    rowFrameRequested = false;
    const e = pendingRowEvent;
    pendingRowEvent = null;
    if (!rowDragId || !e) return;

    const cursorDelta = e.clientY - rowDragStartClientY;
    let swapped = false;

    // order[] is the RING's own indexing and IS circular (order[n-1]'s
    // "next" is legitimately order[0] going around the circle) — but the
    // LIST is a linear, top-to-bottom sequence, not a loop. Using order[]'s
    // %n wraparound here treated the top row's "previous" as the bottom
    // row (and the bottom row's "next" as the top row), so grabbing the
    // very top row immediately found a "previous" neighbour clear at the
    // bottom and cascaded a swap-chain the whole way there. The bounds
    // below (k+1>=n / k-1<0 → no such neighbour, stop) are what make the
    // list's own top/bottom actual dead ends, independent of whichever
    // ids currently happen to occupy those two positions — checked here
    // against the block's own leading edge in each direction, not just
    // rowDragId, so a multi-row block respects the same dead ends.
    for (let guard = 0; guard < n; guard++) {
      const bottomId = rowDragBlockEdge(1);
      const k = slotOf[bottomId];
      if (k + 1 >= n) break;
      const nextId = order[k + 1];
      const rect = rowById[nextId].getBoundingClientRect();
      if (rowDragBlockStartMidY[bottomId] + cursorDelta < rect.top + rect.height / 2) break;
      bubbleExternalThroughBlock(nextId, 1);
      swapped = true;
    }
    for (let guard = 0; guard < n; guard++) {
      const topId = rowDragBlockEdge(-1);
      const k = slotOf[topId];
      if (k - 1 < 0) break;
      const prevId = order[k - 1];
      const rect = rowById[prevId].getBoundingClientRect();
      if (rowDragBlockStartMidY[topId] + cursorDelta >= rect.top + rect.height / 2) break;
      bubbleExternalThroughBlock(prevId, -1);
      swapped = true;
    }

    // Any swap re-evens spacing around the whole ring (rowDragId is the
    // pin — everything else redistributes around it, or around it and
    // whichever nodes are locked, if any) — regardless of editing mode,
    // any reorder keeps every point's spacing adjusted.
    if (swapped) { relayoutRing(rowDragId); syncListToRingOrder(); rowDragSwapped = true; }

    // Every dragged row (the whole block, not just rowDragId) tracks the
    // cursor continuously as a rigid group — each one offset from wherever
    // IT naturally landed, using the one shared cursor delta, so a swap
    // that shifts the block's DOM position doesn't break the group's
    // visual cohesion. Transforms are cleared before measuring, same
    // reason as the single-row version: getBoundingClientRect() reports
    // the painted (transformed) position, so last frame's offset would
    // otherwise contaminate this frame's "natural" reading.
    rowDragBlockIds.forEach(bid => { rowById[bid].style.transform = ''; });
    rowDragBlockIds.forEach(bid => {
      const row = rowById[bid];
      const naturalRect = row.getBoundingClientRect();
      const naturalMid = naturalRect.top + naturalRect.height / 2;
      const trackedMid = rowDragBlockStartMidY[bid] + cursorDelta;
      row.style.transform = 'translateY(' + (trackedMid - naturalMid) + 'px)';
    });
  }

  function onRowDragEnd() {
    if (!rowDragId) return;
    rowDragBlockIds.forEach(bid => {
      const row = rowById[bid];
      row.classList.remove('row-dragging');
      row.style.transform = '';
    });
    document.removeEventListener('pointermove', onRowDragMove);
    document.removeEventListener('pointerup', onRowDragEnd);
    document.removeEventListener('pointercancel', onRowDragEnd);
    rowDragId = null;
    rowDragBlockIds = [];
    rowDragBlockStartMidY = {};
    pendingRowEvent = null;
    pushHistory();
    if (rowDragSwapped) pushStructureHistory();
  }

  const btnPenMode = document.getElementById('btnPenMode');
  const nodeListHeadView = document.getElementById('nodeListHeadView');
  const nodeListHeadEdit = document.getElementById('nodeListHeadEdit');
  const nodeListAddRow = document.getElementById('nodeListAddRow');
  const btnAddNode = document.getElementById('btnAddNode');
  const btnListCancel = document.getElementById('btnListCancel');
  const btnListCommit = document.getElementById('btnListCommit');
  const btnListUndo = document.getElementById('btnListUndo');
  const btnListRedo = document.getElementById('btnListRedo');

  function enterStructureEditing() {
    if (!listOpen || structureEditing) return;
    closeEditPanel();
    // The list may be showing a stale sequence if dots were dragged around
    // on the ring since the last sync — always start pen mode from the
    // ring's actual current order.
    syncListToRingOrder();
    structureSnapshot = snapshotStructure();
    structureHistory = [structureSnapshot];
    structureHistoryIndex = 0;
    resetSelection();
    structureEditing = true;
    nodeListEl.classList.add('structure-editing');
    nodeListHeadView.hidden = true;
    nodeListHeadEdit.hidden = false;
    nodeListAddRow.hidden = false;
    document.getElementById('btnCommit').disabled = true;
    document.getElementById('btnCancel').disabled = true;
    btnToggleList.disabled = true;
    updateHistoryButtons();
    updateStructureHistoryButtons();
  }

  function exitStructureEditing() {
    structureEditing = false;
    structureSnapshot = null;
    structureHistory = [];
    structureHistoryIndex = 0;
    resetSelection();
    nodeListEl.classList.remove('structure-editing');
    nodeListHeadView.hidden = false;
    nodeListHeadEdit.hidden = true;
    nodeListAddRow.hidden = true;
    document.getElementById('btnCommit').disabled = false;
    document.getElementById('btnCancel').disabled = false;
    btnToggleList.disabled = false;
    // The node set may have changed — old position history could reference
    // ids that no longer exist (or miss ones just added), so it's reset to
    // a single fresh snapshot of wherever things ended up.
    history = [clonePositions(current)];
    historyIndex = 0;
    updateHistoryButtons();
  }

  btnPenMode.addEventListener('click', enterStructureEditing);
  btnAddNode.addEventListener('click', () => { createNewNode(); pushStructureHistory(); });
  btnListUndo.addEventListener('click', undoStructure);
  btnListRedo.addEventListener('click', redoStructure);
  btnListCommit.addEventListener('click', () => {
    exitStructureEditing();
    showToast('已套用節點清單的變更');
  });
  btnListCancel.addEventListener('click', () => {
    restoreFromStructureSnapshot(structureSnapshot);
    exitStructureEditing();
    showToast('已還原節點清單的變更');
  });

  updateHistoryButtons();
})();
</script>
</body>
</html>
