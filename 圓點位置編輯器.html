<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>圓點位置編輯器｜原型結構首頁網絡圖</title>
<style>
  :root {
    --bg: #fcfcfc;
    --bg-translucent: rgba(252, 252, 252, 0.88);
    --text: #1a1a1a;
    --line: #d9d9d9;
    --dot: #1a1a1a;
    --special: #808080;
    --border: #e2e2e2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg-translucent: rgba(26, 26, 26, 0.88);
      --text: #f5f5f5;
      --line: #444444;
      --dot: #f5f5f5;
      --special: #d4af37;
      --border: #3a3a3a;
    }
  }
  /* Explicit user choice (via the header toggle button) always wins over
     the OS/browser's own prefers-color-scheme — the attribute selector's
     extra specificity beats the plain :root inside the media query above,
     in either direction, regardless of which one the system prefers. */
  :root[data-theme="light"] {
    --bg: #fcfcfc;
    --bg-translucent: rgba(252, 252, 252, 0.88);
    --text: #1a1a1a;
    --line: #d9d9d9;
    --dot: #1a1a1a;
    --special: #808080;
    --border: #e2e2e2;
  }
  :root[data-theme="dark"] {
    --bg: #1a1a1a;
    --bg-translucent: rgba(26, 26, 26, 0.88);
    --text: #f5f5f5;
    --line: #444444;
    --dot: #f5f5f5;
    --special: #d4af37;
    --border: #3a3a3a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; min-height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  /* The diagram (ring + long radial labels) is drawn larger than any single
     viewport can show at a readable scale — rather than shrinking it to
     fit, the page itself grows to the diagram's real size and scrolls in
     both directions to reach the rest, instead of letting the fixed header
     or the viewport bounds clip it. */
  html { overflow-y: auto; }
  body { overflow-x: auto; }

  /* HEADER — only the two requested actions, nothing from the main site's header/footer */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    background: var(--bg-translucent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 14px; font-weight: 700; letter-spacing: 0.04em; margin: 0;
  }
  .sc-btns { display: flex; gap: 12px; }
  button.sc-btn {
    font-size: 13px; font-weight: 600; letter-spacing: 0.03em;
    padding: 9px 20px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--text); background: none; color: var(--text);
    transition: opacity 0.2s ease, background-color 0.2s ease, color 0.2s ease;
  }
  button.sc-btn:hover { opacity: 0.6; }
  button.sc-btn.primary { background: var(--text); color: var(--bg); }
  button.sc-btn.primary:hover { opacity: 0.85; }
  button.sc-btn:disabled,
  button.sc-btn:disabled:hover { opacity: 0.3; cursor: not-allowed; }
  #btnUndo, #btnRedo, #btnResetSpacing, #btnThemeToggle {
    padding: 9px 14px; font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  #btnResetSpacing svg, #btnThemeToggle svg { width: 15px; height: 15px; display: block; }
  .sc-divider { width: 1px; align-self: stretch; background: var(--border); margin: 0 4px; }
  #btnSyncSite { display: flex; align-items: center; gap: 6px; }

  /* Left-side node list — fixed to the viewport (not the page) so it never
     scrolls away with the oversized diagram. Closed by default; opening it
     pushes #mainContent over via padding-left rather than overlaying, per
     the requested "推開版面" behavior. */
  .list-toggle {
    position: fixed; left: 0; top: 50%; z-index: 1001;
    transform: translateY(-50%);
    padding: 14px 9px; border: none; border-radius: 0 8px 8px 0;
    background: var(--text); color: var(--bg); cursor: pointer;
    font-size: 15px; line-height: 1;
    transition: left 0.25s ease, opacity 0.2s ease;
  }
  .list-toggle:hover { opacity: 0.85; }
  .list-toggle.open { left: 280px; }
  /* When the per-node edit panel is also open, it starts exactly where the
     toggle button would otherwise sit (left: 280px) — push the button past
     it too, or it floats on top of the edit fields (name/angle/size/colour/
     href) since the button's z-index is intentionally above every panel. */
  .list-toggle.open.connections-open { left: 540px; }
  .list-toggle:disabled { opacity: 0.4; cursor: not-allowed; }

  .node-list {
    position: fixed; left: 0; top: var(--header-h, 71px); bottom: 0; width: 280px;
    display: flex; flex-direction: column;
    background: var(--bg);
    /* border-right only while open — the translateX hide below carries the
       border along with it, so an always-on border here would still leave
       a 1px line sitting at the viewport's left edge even while closed. */
    border-right: 0 solid var(--border);
    transform: translateX(-100%);
    transition: transform 0.25s ease, border-right-width 0.25s ease;
    z-index: 998;
  }
  .node-list.open { transform: translateX(0); border-right-width: 1px; }
  .node-list-head {
    flex-shrink: 0; padding: 14px 12px 14px 20px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }
  .node-list-head-view:not([hidden]) { display: flex; align-items: center; justify-content: space-between; }
  .node-list-pen-btn {
    flex-shrink: 0; width: 26px; height: 26px; border: none; background: none;
    color: var(--text); opacity: 0.55; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; border-radius: 5px;
    transition: opacity 0.2s ease, background-color 0.2s ease;
  }
  .node-list-pen-btn:hover { opacity: 1; background: var(--border); }
  /* :not([hidden]) — an unconditional `display: flex` here would outrank
     the `hidden` attribute's own display:none (author rule beats the UA
     stylesheet's attribute selector), leaving Cancel/Commit visible even
     when this element carries `hidden`. */
  .node-list-head-edit:not([hidden]) { display: flex; gap: 6px; }
  .node-list-head-edit .sc-btn {
    padding: 7px 10px; font-size: 14px; min-width: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .node-list-add-row { flex-shrink: 0; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .node-list-add-btn {
    width: 100%; padding: 8px; border: 1px dashed var(--border); border-radius: 6px;
    background: none; color: var(--text); cursor: pointer; font-size: 13px; font-weight: 600;
    transition: background-color 0.2s ease, border-color 0.2s ease;
  }
  .node-list-add-btn:hover { background: var(--border); border-color: var(--text); }

  .node-list-items { flex: 1 1 auto; overflow-y: auto; padding: 8px; }
  .node-list-row {
    display: flex; align-items: center; border-radius: 5px;
  }
  .node-list-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .node-list-row.editing { background: rgba(155, 125, 31, 0.14); }
  .node-list-row.row-selected { background: rgba(155, 125, 31, 0.14); }
  .node-list-row.row-dragging {
    opacity: 0.85; background: var(--border);
    position: relative; z-index: 10;
  }
  .node-list-item {
    flex: 1 1 auto; min-width: 0; display: block; text-align: left;
    padding: 7px 12px; margin: 0; border: none; background: none;
    border-radius: 5px; cursor: pointer;
    font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .node-list-item:hover { background: var(--border); }
  .node-list-item.special { color: var(--special); font-weight: 700; }
  /* Edit-target triangle, on the right of each row. Distinct from clicking
     the name itself (which just locates/highlights it on the ring) —
     rotates down when this node is the sole current edit target. */
  .node-list-edit-target {
    flex-shrink: 0; width: 24px; height: 24px; margin-left: 2px;
    border: none; background: none; border-radius: 4px; cursor: pointer;
    color: var(--text); opacity: 0.45; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s ease, opacity 0.2s ease, background-color 0.2s ease, color 0.2s ease;
  }
  .node-list-edit-target:hover { opacity: 1; background: var(--border); }
  .node-list-edit-target.active { opacity: 1; color: var(--special); transform: rotate(90deg); }

  /* Drag handle + delete only make sense while restructuring the list, so
     they're hidden the rest of the time; the edit-target triangle is the
     reverse (hidden during structure editing, to keep the two modes from
     overlapping). */
  .node-list-handle, .node-list-lock, .node-list-delete { display: none; flex-shrink: 0; width: 22px; height: 24px; }
  .node-list-handle {
    align-items: center; justify-content: center; color: var(--text); opacity: 0.45;
    font-size: 13px; cursor: grab; touch-action: none;
  }
  .node-list-lock, .node-list-delete {
    border: none; background: none; border-radius: 4px; color: var(--text);
    opacity: 0.45; cursor: pointer; font-size: 12px;
    align-items: center; justify-content: center;
    transition: opacity 0.2s ease, background-color 0.2s ease, color 0.2s ease;
  }
  .node-list-lock svg { width: 12px; height: 12px; fill: currentColor; display: block; }
  .node-list-lock:hover, .node-list-delete:hover { opacity: 1; background: var(--border); }
  .node-list-lock.locked { opacity: 1; }
  .node-list-row.row-locked .node-list-handle { cursor: not-allowed; opacity: 0.25; }
  .node-list.structure-editing .node-list-handle,
  .node-list.structure-editing .node-list-lock,
  .node-list.structure-editing .node-list-delete { display: flex; }
  .node-list.structure-editing .node-list-edit-target { display: none; }

  /* Edit panel, flyout to the right of the main list for whichever single
     node is the current edit target — properties (name/position/size/
     colour) plus its connection list (add/remove). A separate panel (not
     inline in the row) so picking a target never reflows the list itself. */
  .node-connections {
    position: fixed; left: 280px; top: var(--header-h, 71px); bottom: 0; width: 0;
    overflow: hidden;
    display: flex; flex-direction: column;
    background: var(--bg);
    /* border-right only while open — at width:0 the left and right edges of
       this box are the same point, so an always-on border here would draw
       a 1px line at x:280 (right where the panel appears when opened)
       even while it's fully collapsed and supposedly invisible. */
    border-right: 0 solid var(--border);
    transition: width 0.2s ease, border-right-width 0.2s ease;
    z-index: 997;
  }
  .node-connections.open { width: 260px; border-right-width: 1px; }
  .edit-panel-head { flex-shrink: 0; padding: 16px 16px 8px; width: 260px; box-sizing: border-box; }
  .edit-name-input {
    width: 100%; font-size: 14px; font-weight: 700; padding: 7px 9px;
    border: 1px solid var(--border); border-radius: 5px;
    background: var(--bg); color: var(--text); box-sizing: border-box;
  }
  .edit-panel-fields {
    flex-shrink: 0; width: 260px; box-sizing: border-box;
    padding: 0 16px 14px; display: flex; flex-direction: column; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .edit-field { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text); opacity: 0.8; }
  .edit-field input, .edit-field select {
    font-size: 13px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 5px;
    background: var(--bg); color: var(--text); box-sizing: border-box; font-family: inherit;
  }
  .edit-angle-dial-wrap { display: flex; justify-content: center; padding: 2px 0 4px; }
  .edit-angle-dial { width: 128px; height: 128px; touch-action: none; cursor: grab; }
  .edit-angle-dial.dial-dragging { cursor: grabbing; }
  .dial-ring { fill: none; stroke: var(--border); stroke-width: 1.5; }
  .dial-tick { stroke: var(--border); stroke-width: 1.5; }
  .dial-tick-label { fill: var(--text); opacity: 0.4; font-size: 10px; }
  .dial-pointer { stroke: var(--special); stroke-width: 2; stroke-linecap: round; pointer-events: none; }
  .dial-center { fill: var(--special); pointer-events: none; }
  .node-connections-subhead {
    flex-shrink: 0; width: 260px; box-sizing: border-box;
    padding: 12px 16px 8px; display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; font-weight: 700; letter-spacing: 0.05em; opacity: 0.85;
  }
  .edit-add-btn {
    width: 22px; height: 22px; border: 1px solid var(--text); border-radius: 5px;
    background: none; color: var(--text); cursor: pointer; font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background-color 0.2s ease, color 0.2s ease;
  }
  .edit-add-btn:hover { background: var(--text); color: var(--bg); }
  .add-connection-row { flex-shrink: 0; width: 260px; box-sizing: border-box; padding: 0 16px 10px; }
  .add-connection-row select {
    width: 100%; font-size: 13px; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box;
  }
  .node-connections-items { flex: 1 1 auto; overflow-y: auto; padding: 8px; width: 260px; box-sizing: border-box; }
  .node-connections-row { display: flex; align-items: center; }
  .node-connections-remove {
    flex-shrink: 0; width: 24px; height: 24px; border: none; background: none;
    color: var(--text); opacity: 0.4; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; border-radius: 4px;
    transition: opacity 0.2s ease, background-color 0.2s ease;
  }
  .node-connections-remove:hover { opacity: 1; background: var(--border); }

  main {
    padding: 128px 16px 80px;
    box-sizing: border-box;
    transition: padding-left 0.25s ease;
  }
  main.list-open { padding-left: 296px; }
  main.list-open.connections-open { padding-left: 556px; }
  /* --content-scale (set by the script below once the diagram's real extent
     is known) keeps each dot/label at the same on-screen size as the original
     900-unit design — the stage simply grows past min(92vw, 78vh) instead
     of shrinking everything to fit, which is what makes it scrollable.
     margin: 0 auto (not flex centering) so an oversized stage still starts
     flush at the left edge and every bit of the overflow stays reachable
     by scrolling, rather than being centered into an unreachable negative
     offset. */
  #stage {
    width: calc(min(92vw, 78vh) * var(--content-scale, 1));
    max-width: calc(1700px * var(--content-scale, 1));
    aspect-ratio: 1 / 1;
    margin: 0 auto;
  }
  svg { width: 100%; height: 100%; overflow: visible; display: block; }

  .sc-node { cursor: grab; touch-action: none; }
  .sc-node.dragging { cursor: grabbing; }
  .sc-hit { fill: transparent; }
  .sc-dot { transition: fill 0.2s ease; }
  .sc-edge { transition: opacity 0.2s ease; }
  .sc-label { pointer-events: none; }
  /* A displaced dot slides into its new seat instead of teleporting, so a
     swap reads clearly — but the dot under the pointer must track it with
     zero lag, so its own transition is switched off while dragging. */
  .sc-dot, .sc-hit { transition: cx 0.18s ease-out, cy 0.18s ease-out, fill 0.2s ease; }
  .sc-edge { transition: x1 0.18s ease-out, y1 0.18s ease-out, x2 0.18s ease-out, y2 0.18s ease-out, opacity 0.2s ease; }
  .sc-node.dragging .sc-dot, .sc-node.dragging .sc-hit,
  .sc-edge.sc-drag-live { transition: fill 0.2s ease, opacity 0.2s ease; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; z-index: 2000;
    transform: translateX(-50%) translateY(16px);
    background: #1a1a1a; color: #fff; font-size: 13px;
    padding: 10px 22px; border-radius: 999px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-overlay[hidden] { display: none; }
  .modal-box {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; width: min(720px, 92vw); max-height: 82vh;
    display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .modal-head {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 14px;
  }
  .modal-close {
    border: none; background: none; color: var(--text); opacity: 0.6; cursor: pointer;
    font-size: 15px; line-height: 1; padding: 4px 6px; border-radius: 4px;
    transition: opacity 0.2s ease, background-color 0.2s ease;
  }
  .modal-close:hover { opacity: 1; background: var(--border); }
  .modal-hint { flex-shrink: 0; margin: 12px 18px 0; font-size: 12.5px; color: var(--text); opacity: 0.75; line-height: 1.5; }
  .modal-output {
    flex: 1 1 auto; margin: 10px 18px 0; min-height: 240px;
    font-family: ui-monospace, SFMono-Regular, Consolas, 'Courier New', monospace;
    font-size: 12px; line-height: 1.5; white-space: pre; resize: vertical;
    background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px;
    padding: 10px; box-sizing: border-box;
  }
  .modal-actions { flex-shrink: 0; display: flex; justify-content: flex-end; gap: 8px; padding: 14px 18px; }
</style>
<script>
  // Applies a previously saved explicit theme choice before first paint, so
  // there's no flash of the OS-default theme before the toggle button's own
  // script (at the bottom of the page) gets a chance to run.
  (function () {
    try {
      var t = localStorage.getItem('dotPositionEditor:theme:v1');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
    } catch (err) {}
  })();
</script>
</head>
<body>

<header id="pageHeader">
  <h1>圓點位置編輯器　·　拖曳任意圓點調整位置</h1>
  <div class="sc-btns">
    <button type="button" class="sc-btn" id="btnUndo" aria-label="上一步">↶</button>
    <button type="button" class="sc-btn" id="btnRedo" aria-label="下一步">↷</button>
    <button type="button" class="sc-btn" id="btnResetSpacing" aria-label="重新整理間距">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
      </svg>
    </button>
    <button type="button" class="sc-btn" id="btnThemeToggle" aria-label="切換深色/淺色模式"></button>
    <div class="sc-divider"></div>
    <button type="button" class="sc-btn" id="btnCancel">Cancel changes</button>
    <button type="button" class="sc-btn primary" id="btnCommit">Commit changes</button>
    <button type="button" class="sc-btn" id="btnSyncSite" aria-label="同步至主網頁">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;">
        <circle cx="12" cy="12" r="3"/>
        <line x1="3" y1="12" x2="9" y2="12"/>
        <line x1="15" y1="12" x2="21" y2="12"/>
      </svg>
      <span>同步至主網頁</span>
    </button>
  </div>
</header>

<div class="modal-overlay" id="syncModalOverlay" hidden>
  <div class="modal-box">
    <div class="modal-head">
      <span>主網頁同步程式碼</span>
      <button type="button" id="btnCloseSyncModal" class="modal-close" aria-label="關閉">✕</button>
    </div>
    <p class="modal-hint">複製以下內容，貼到「建築事務所首頁.dc.html」對應區塊，取代原本的 specialIds／nodeData／edgeData 三段賦值（保留其餘程式碼不動）。</p>
    <textarea id="syncOutput" class="modal-output" readonly spellcheck="false"></textarea>
    <div class="modal-actions">
      <button type="button" id="btnCopySync" class="sc-btn primary">複製到剪貼簿</button>
    </div>
  </div>
</div>

<button type="button" id="btnToggleList" class="list-toggle" aria-expanded="false" aria-controls="nodeList">
  <span id="listToggleIcon">☰</span>
</button>

<aside id="nodeList" class="node-list">
  <div class="node-list-head">
    <div class="node-list-head-view" id="nodeListHeadView">
      <span>節點清單</span>
      <button type="button" id="btnPenMode" class="node-list-pen-btn" aria-label="編輯節點清單">✒</button>
    </div>
    <div class="node-list-head-edit" id="nodeListHeadEdit" hidden>
      <button type="button" class="sc-btn" id="btnListUndo" aria-label="上一步">↶</button>
      <button type="button" class="sc-btn" id="btnListRedo" aria-label="下一步">↷</button>
      <button type="button" class="sc-btn" id="btnListCancel" aria-label="Cancel changes">✕</button>
      <button type="button" class="sc-btn primary" id="btnListCommit" aria-label="Commit changes">✓</button>
    </div>
  </div>
  <div class="node-list-add-row" id="nodeListAddRow" hidden>
    <button type="button" id="btnAddNode" class="node-list-add-btn">＋ 新增節點</button>
  </div>
  <div class="node-list-items" id="nodeListItems"></div>
</aside>

<aside id="nodeConnections" class="node-connections">
  <div class="edit-panel-head">
    <input type="text" id="editName" class="edit-name-input" placeholder="圓點名稱">
  </div>
  <div class="edit-panel-fields">
    <label class="edit-field">
      <span>位置角度（0–360°）</span>
      <input type="number" id="editAngle" min="0" max="360" step="0.1">
    </label>
